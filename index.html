// PDF EXPORT — 直接下載 .pdf 檔
// ═══════════════════════════════════════════
async function exportPDF() {
  document.getElementById('export-menu').classList.remove('open');

  // ── 1. 截取各天地圖圖片 ──────────────────
  showProgress('正在截取地圖…', 10);
  await new Promise(r => setTimeout(r, 200));

  const mapImgsByDay = {};
  const wasOnMap = document.getElementById('page-map').classList.contains('active');
  const prevDay = currentMapDay;

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-map').classList.add('active');
  if (!leafletMap) { renderMap(); await new Promise(r => setTimeout(r, 800)); }
  else { leafletMap.invalidateSize(); }

  for (let di = 0; di < data.days.length; di++) {
    showProgress(`截取 Day ${di+1} 地圖…`, 10 + Math.round((di / data.days.length) * 30));
    currentMapDay = di;
    renderMap();
    await new Promise(r => setTimeout(r, 900));
    try {
      const mapEl = document.getElementById('leaflet-map');
      const canvas = await html2canvas(mapEl, { useCORS: true, scale: 1.5, logging: false });
      mapImgsByDay[di] = canvas.toDataURL('image/png');
    } catch(e) {
      console.warn('地圖截圖失敗 Day', di, e);
    }
  }

  // 還原頁面狀態
  currentMapDay = prevDay;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(wasOnMap ? 'page-map' : 'page-itinerary').classList.add('active');
  renderMap();

  // ── 2. 建立隱藏的列印 HTML 並用 html2canvas 逐頁渲染 ──
  showProgress('正在建立 PDF…', 45);
  await new Promise(r => setTimeout(r, 100));

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const PAGE_W = 210; // A4 mm
  const PAGE_H = 297;
  const MARGIN = 10;
  const CONTENT_W = PAGE_W - MARGIN * 2;

  // 建立一個隱藏容器，寬度固定 700px，讓 html2canvas 截圖
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;left:-9999px;top:0;width:700px;background:white;font-family:sans-serif;';
  document.body.appendChild(wrap);

  let firstPage = true;

  // ── 封面 ──
  const coverEl = document.createElement('div');
  coverEl.innerHTML = `
    <div style="background:linear-gradient(135deg,#1a6b8a,#5aa8c8);color:white;padding:48px 32px 40px;text-align:center;">
      <div style="font-size:2.2rem;margin-bottom:12px;">🏝</div>
      <div style="font-family:'Noto Serif TC',serif;font-size:1.9rem;font-weight:700;letter-spacing:0.1em;margin-bottom:10px;">${escHtml(data.title)}</div>
      <div style="font-size:0.95rem;opacity:0.88;">${escHtml(data.subtitle)}</div>
    </div>
    <div style="padding:20px 28px 10px;font-size:0.8rem;color:#4a6274;text-align:center;">
      共 ${data.days.length} 天 · ${data.days.reduce((s,d)=>s+d.stops.length,0)} 個景點
    </div>`;
  wrap.appendChild(coverEl);
  if (document.fonts && document.fonts.ready) await document.fonts.ready;
  await new Promise(r => setTimeout(r, 300));
  const coverCanvas = await html2canvas(coverEl, { scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false });
  const coverH_mm = (coverCanvas.height / coverCanvas.width) * CONTENT_W;
  pdf.addImage(coverCanvas.toDataURL('image/png'), 'PNG', MARGIN, MARGIN, CONTENT_W, coverH_mm);
  firstPage = false;
  wrap.innerHTML = '';

  // ── 各天行程 ──
  for (let di = 0; di < data.days.length; di++) {
    showProgress(`產生 Day ${di+1} PDF…`, 50 + Math.round((di / data.days.length) * 45));
    await new Promise(r => setTimeout(r, 80));

    const day = data.days[di];
    let stopsHTML = '';
    day.stops.forEach((stop, si) => {
      const isLast = si === day.stops.length - 1;
      const noteTag = stop.note ? `<span style="font-size:0.68rem;padding:2px 7px;border-radius:8px;background:#fce4e0;color:#9b3020;">${escHtml(stop.note)}</span>` : '';
      let arriveTag = '';
      if (si > 0) {
        const prev = day.stops[si - 1];
        const drv = day.drives[si - 1] || 0;
        arriveTag = `<span style="font-size:0.68rem;padding:2px 7px;border-radius:8px;background:#fef3cd;color:#8a6200;">抵達 ${minutesToTime(timeToMinutes(prev.depart) + drv)}</span>`;
      }
      const leaveTag = !isLast
        ? `<span style="font-size:0.68rem;padding:2px 7px;border-radius:8px;background:#fff8e6;color:#b07c20;">離開 ${stop.depart}</span>`
        : `<span style="font-size:0.68rem;padding:2px 7px;border-radius:8px;background:#fef3cd;color:#8a6200;">抵達 ${stop.depart}</span>`;
      // 先渲染交通列（在景點之前）
      if (si > 0) {
        const modeIcon = (day.modes&&day.modes[si-1])==='walk'?'🚶':'🚗';
        stopsHTML += `
          <div style="display:flex;align-items:stretch;">
            <div style="display:flex;flex-direction:column;align-items:center;width:30px;flex-shrink:0;margin-right:12px;">
              <div style="width:2px;background:#cce0ea;height:6px;"></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
                <div style="width:20px;height:20px;border-radius:50%;background:#eaf4f8;border:1.5px dashed #5aa8c8;display:flex;align-items:center;justify-content:center;font-size:0.65rem;">${modeIcon}</div>
                <div style="font-size:0.6rem;color:#1a6b8a;background:#eaf4f8;padding:1px 5px;border-radius:6px;white-space:nowrap;">約 ${day.drives[si-1]} 分鐘</div>
              </div>
              <div style="width:2px;background:#cce0ea;flex:1;min-height:6px;"></div>
            </div>
            <div style="flex:1;"></div>
          </div>`;
      }
      stopsHTML += `
        <div style="display:flex;align-items:stretch;margin-bottom:0;">
          <div style="display:flex;flex-direction:column;align-items:center;width:30px;flex-shrink:0;margin-right:12px;">
            <div style="width:24px;height:24px;border-radius:50%;background:#1a6b8a;color:white;font-size:0.68rem;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:12px;">${si+1}</div>
            ${!isLast ? '<div style="width:2px;background:#cce0ea;flex:1;margin-top:4px;"></div>' : ''}
          </div>
          <div style="flex:1;padding:10px 0 8px;${!isLast ? 'border-bottom:1px solid #f5f5f5;' : ''}">
            <div style="font-family:\'Noto Serif TC\',serif;font-size:0.9rem;font-weight:600;color:#1c2b35;">${escHtml(stop.name)}</div>
            <div style="display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;">${arriveTag}${leaveTag}${noteTag}</div>
          </div>
        </div>`;
    });

    const dayEl = document.createElement('div');
    dayEl.style.cssText = 'background:white;';
    dayEl.innerHTML = `
      <div style="background:linear-gradient(90deg,#1a6b8a,#5aa8c8);color:white;padding:14px 20px;border-radius:10px 10px 0 0;">
        <div style="font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:600;">🗓 ${escHtml(day.label)} · ${escHtml(day.theme)}</div>
      </div>
      <div style="padding:12px 20px 16px;background:white;">${stopsHTML}</div>
      ${mapImgsByDay[di] ? `
      <div style="padding:12px 20px 16px;background:#f5f9fb;border-top:1px solid #cce0ea;">
        <div style="font-size:0.75rem;color:#4a6274;margin-bottom:6px;font-weight:600;">🗺 路線地圖</div>
        <img src="${mapImgsByDay[di]}" style="width:100%;border-radius:8px;border:1px solid #cce0ea;display:block;">
      </div>` : ''}`;
    wrap.appendChild(dayEl);
    await new Promise(r => setTimeout(r, 200));

    const dayCanvas = await html2canvas(dayEl, { scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false });
    const imgDataUrl = dayCanvas.toDataURL('image/png');
    const imgW = CONTENT_W;
    const imgH = (dayCanvas.height / dayCanvas.width) * imgW;

    // 若內容超過一頁，分頁切割
    const usableH = PAGE_H - MARGIN * 2;
    if (imgH <= usableH) {
      pdf.addPage();
      pdf.addImage(imgDataUrl, 'PNG', MARGIN, MARGIN, imgW, imgH);
    } else {
      // 分段輸出
      let srcY = 0;
      const scale = dayCanvas.width / imgW; // px per mm
      while (srcY < dayCanvas.height) {
        pdf.addPage();
        const sliceH_px = Math.round(usableH * scale);
        const sliceCanvas = document.createElement('canvas');
        sliceCanvas.width = dayCanvas.width;
        sliceCanvas.height = Math.min(sliceH_px, dayCanvas.height - srcY);
        const ctx = sliceCanvas.getContext('2d');
        ctx.drawImage(dayCanvas, 0, srcY, sliceCanvas.width, sliceCanvas.height, 0, 0, sliceCanvas.width, sliceCanvas.height);
        const sliceH_mm = (sliceCanvas.height / scale);
        pdf.addImage(sliceCanvas.toDataURL('image/png'), 'PNG', MARGIN, MARGIN, imgW, sliceH_mm);
        srcY += sliceH_px;
      }
    }
    wrap.innerHTML = '';
  }

  document.body.removeChild(wrap);

  // ── 3. 下載 ──
  showProgress('正在下載 PDF…', 98);
  await new Promise(r => setTimeout(r, 100));
  const safeName = data.title.replace(/[\u{1F300}-\u{1FFFF}\s]/gu,'').replace(/[^\w\u4e00-\u9fff]/g,'') || '行程';
  pdf.save(`${safeName}.pdf`);
  hideProgress();
  showToast('📄 PDF 已下載！');
}

function buildPrintHTML(mapImgsByDay) {
  mapImgsByDay = mapImgsByDay || {};
  let daysHTML = '';
  data.days.forEach((day, di) => {
    let stopsHTML = '';
    day.stops.forEach((stop, si) => {
      const isLast = si === day.stops.length - 1;
      const noteTag = stop.note ? `<span class="tag tag-note">${escHtml(stop.note)}</span>` : '';
      let arriveTag = '';
      if (si > 0) {
        const prevStop = day.stops[si - 1];
        const drive = day.drives[si - 1] || 0;
        const arrMins = timeToMinutes(prevStop.depart) + drive;
        arriveTag = `<span class="tag tag-arrive">抵達 ${minutesToTime(arrMins)}</span>`;
      }
      const leaveTag = !isLast
        ? `<span class="tag tag-leave">離開 ${stop.depart}</span>`
        : `<span class="tag tag-arrive">抵達 ${stop.depart}</span>`;
      if (si > 0) {
        const modeIcon = (day.modes && day.modes[si-1]) === 'walk' ? '🚶' : '🚗';
        stopsHTML += `
          <div class="cap-transit">
            <div class="cap-transit-icon-col">
              <div class="cap-transit-icon">${modeIcon}</div>
              <span class="cap-transit-text">約 ${day.drives[si-1]} 分鐘</span>
            </div>
          </div>`;
      }
      stopsHTML += `
        <div class="capture-stop-row ${isLast ? 'cap-last' : ''}">
          <div class="cap-left"><div class="cap-num">${si + 1}</div><div class="cap-line"></div></div>
          <div class="cap-content">
            <div class="cap-name">${escHtml(stop.name)}</div>
            <div class="cap-tags">${arriveTag}${leaveTag}${noteTag}</div>
          </div>
        </div>
      `;
    });
    const mapImg = mapImgsByDay[di]
      ? `<div style="padding:12px 20px 16px;background:#f5f9fb;border-top:1px solid #cce0ea;">
           <div style="font-size:0.75rem;color:#4a6274;margin-bottom:6px;font-weight:600;">🗺 路線地圖</div>
           <img src="${mapImgsByDay[di]}" style="width:100%;border-radius:10px;border:1px solid #cce0ea;" />
         </div>`
      : '';
    daysHTML += `
      <div class="print-day-card">
        <div class="capture-header" style="border-radius:12px 12px 0 0">
          <div class="ch-day" style="margin:0;font-size:1rem">🗓 ${day.label} · ${day.theme}</div>
        </div>
        <div class="capture-body">${stopsHTML}</div>
        ${mapImg}
      </div>
    `;
  });

  return `<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><title>${data.title}</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ocean:#1a6b8a;--sky:#5aa8c8;--sand:#f5ede0;--dark:#1c2b35;--mid:#4a6274;--light:#eaf4f8;--white:#fff;--border:#cce0ea;--green:#2d9e6b;--green-bg:#d8f0e4;--amber:#8a6200;--amber-bg:#fef3cd;--amber-light:#b07c20;--amber-light-bg:#fff8e6;--red:#9b3020;--red-bg:#fce4e0;}
*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Noto Sans TC',sans-serif;color:var(--dark);background:white;}
.print-header{background:linear-gradient(135deg,var(--ocean),var(--sky));color:white;padding:32px;text-align:center;margin-bottom:24px;}
.print-header h1{font-family:'Noto Serif TC',serif;font-size:1.8rem;letter-spacing:0.1em;}
.print-header p{font-size:0.9rem;opacity:0.85;margin-top:6px;}
.print-day-card{margin:0 16px 20px;border:1px solid var(--border);border-radius:12px;overflow:hidden;page-break-inside:avoid;}
.capture-header{background:linear-gradient(90deg,var(--ocean),var(--sky));color:white;padding:14px 20px;}
.ch-day{font-family:'Noto Serif TC',serif;font-size:0.95rem;font-weight:600;}
.capture-body{padding:12px 20px 16px;background:white;}
.capture-stop-row{display:flex;align-items:stretch;}
.cap-left{display:flex;flex-direction:column;align-items:center;width:30px;flex-shrink:0;margin-right:12px;}
.cap-num{width:24px;height:24px;border-radius:50%;background:var(--ocean);color:white;font-size:0.68rem;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:12px;}
.cap-line{width:2px;background:var(--border);flex:1;margin-top:4px;}.cap-last .cap-line{display:none;}
.cap-content{flex:1;padding:10px 0 8px;border-bottom:1px solid #f5f5f5;}.cap-last .cap-content{border-bottom:none;}
.cap-name{font-family:'Noto Serif TC',serif;font-size:0.9rem;font-weight:600;}
.cap-tags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
.tag{font-size:0.68rem;padding:2px 7px;border-radius:8px;}
.tag-arrive{background:var(--amber-bg);color:var(--amber);}.tag-leave{background:#fff8e6;color:#b07c20;}.tag-note{background:var(--red-bg);color:var(--red);}
.cap-transit{padding:2px 0;display:flex;align-items:stretch;}
.cap-transit-icon-col{display:flex;flex-direction:column;align-items:center;width:30px;flex-shrink:0;margin-right:12px;gap:2px;padding:2px 0;}
.cap-transit-icon{width:20px;height:20px;border-radius:50%;background:var(--light);border:1.5px dashed var(--sky);display:flex;align-items:center;justify-content:center;font-size:0.65rem;}
.cap-transit-text{font-size:0.62rem;color:var(--ocean);background:var(--light);padding:1px 5px;border-radius:6px;white-space:nowrap;}
@media print{body{print-color-adjust:exact;-webkit-print-color-adjust:exact;}.print-day-card{page-break-inside:avoid;margin:0 0 16px;}@page{margin:15mm;size:A4;}}
</style></head><body>
<div class="print-header"><h1>${data.title}</h1><p>${data.subtitle}</p></div>
${daysHTML}
<div style="text-align:center;font-size:0.72rem;color:var(--mid);padding:16px;">由互動行程產生</div>
</body></html>`;
}

// ═══════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════
function showProgress(msg, pct) {
  document.getElementById('progress-text').textContent = msg;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-overlay').classList.add('open');
}
function hideProgress() {
  document.getElementById('progress-overlay').classList.remove('open');
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════
// MODAL CLOSE ON OVERLAY CLICK
// ═══════════════════════════════════════════
['stop-modal','transit-modal','title-modal','subtitle-modal','day-modal','img-export-modal','pdf-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});

// Ctrl+Z / Cmd+Z 快捷鍵復原
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    // 避免在輸入框內攔截
    if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
    e.preventDefault();
    undo();
  }
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderAll();







</script>
