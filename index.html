<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">澎湖三日遊 · 互動行程</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<!-- html2canvas for image export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <span class="nav-title" onclick="editTripTitle()" title="點擊編輯旅遊名稱">
    <span id="nav-title-text">🏝 澎湖三日遊</span>
    <span class="nav-title-edit-icon">✏️</span>
  </span>
  <button class="nav-btn active" onclick="showPage('itinerary')">📋 行程</button>
  <button class="nav-btn" onclick="showPage('map')">🗺 地圖</button>
  <div class="export-wrap">
    <button class="nav-export" onclick="toggleExportMenu()">⬇ 匯出 ▾</button>
    <div class="export-menu" id="export-menu">
      <button class="export-menu-item" onclick="saveData()">
        <span class="em-icon">💾</span>
        <div>
          <div>儲存行程</div>
          <div style="font-size:0.72rem;color:var(--mid)">存至本機瀏覽器</div>
        </div>
      </button>
      <button class="export-menu-item" onclick="exportHTML()">
        <span class="em-icon">📁</span>
        <div>
          <div>匯出 HTML</div>
          <div style="font-size:0.72rem;color:var(--mid)">下載完整行程檔</div>
        </div>
      </button>
      <div class="export-menu-sep"></div>
      <button class="export-menu-item" onclick="exportJSON()">
        <span class="em-icon">📋</span>
        <div>
          <div>匯出 JSON</div>
          <div style="font-size:0.72rem;color:var(--mid)">分享行程給他人匯入</div>
        </div>
      </button>
      <button class="export-menu-item" onclick="importJSON()">
        <span class="em-icon">📥</span>
        <div>
          <div>匯入 JSON</div>
          <div style="font-size:0.72rem;color:var(--mid)">載入他人分享的行程</div>
        </div>
      </button>
      <div class="export-menu-sep"></div>
      <button class="export-menu-item" onclick="openImgExport()">
        <span class="em-icon">🖼️</span>
        <div>
          <div>匯出圖片</div>
          <div style="font-size:0.72rem;color:var(--mid)">按天下載 PNG</div>
        </div>
      </button>
      <button class="export-menu-item" onclick="exportPDF()">
        <span class="em-icon">📄</span>
        <div>
          <div>匯出 PDF</div>
          <div style="font-size:0.72rem;color:var(--mid)">全部行程一份</div>
        </div>
      </button>
    </div>
  </div>
</nav>

<!-- ITINERARY PAGE -->
<div id="page-itinerary" class="page active">
  <div class="header">
    <h1 id="header-title" onclick="editTripTitle()">🏝 澎湖三日遊 <span style="font-size:0.8rem;color:var(--sky);font-weight:400">✏️</span></h1>
    <p class="subtitle" id="trip-subtitle" onclick="editSubtitle()">4/26（五）— 4/28（日）· 鎖港郵局會館 <span style="font-size:0.75rem">✏️</span></p>
    <br>
    <span class="edit-hint">✏️ 點擊任意景點、車程、天數標題可直接編輯</span>
  </div>
  <div id="days-container"></div>
  <button class="add-day-btn" onclick="addDay()">＋ 新增天數</button>
</div>

<!-- MAP PAGE -->
<div id="page-map" class="page">
  <div class="map-page-header">
    <h2>🗺 路線地圖</h2>
    <p>選擇天數，點按鈕直接開啟 Google Maps 導航</p>
  </div>
  <div class="map-day-tabs" id="map-tabs"></div>
  <div id="map-content"></div>
</div>

<!-- Stop Edit Modal -->
<div class="modal-overlay" id="stop-modal">
  <div class="modal">
    <h3>✏️ 編輯景點</h3>
    <label>景點名稱</label>
    <input type="text" id="edit-name" placeholder="景點名稱">
    <label>備註（可選）</label>
    <input type="text" id="edit-note" placeholder="如：大菓葉・鯨魚洞">
    <div class="modal-row">
      <div>
        <label>離開時間</label>
        <input type="time" id="edit-depart" oninput="onDepartChange()">
      </div>
      <div>
        <label>停留（分鐘）</label>
        <input type="number" id="edit-stay" min="0" max="600" step="5" placeholder="分鐘" oninput="onStayChange()">
      </div>
    </div>
    <p id="modal-arrival-hint" style="font-size:0.74rem;color:var(--mid);margin-top:6px;min-height:1.2em"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveStop()">儲存</button>
    </div>
  </div>
</div>

<!-- Transit Edit Modal -->
<div class="modal-overlay transit-modal" id="transit-modal">
  <div class="modal">
    <h3>🚗 編輯車程</h3>
    <label>車程時間（分鐘）</label>
    <input type="number" id="edit-drive" min="1" max="360" step="1" placeholder="分鐘">
    <p style="font-size:0.75rem;color:var(--mid);margin-top:8px;">修改後，後續景點的出發時間將自動重新計算</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeTransitModal()">取消</button>
      <button class="btn-save" onclick="saveDrive()">儲存</button>
    </div>
  </div>
</div>

<!-- Trip Title Edit Modal -->
<div class="modal-overlay" id="title-modal">
  <div class="modal">
    <h3>✏️ 編輯旅遊名稱</h3>
    <label>旅遊名稱（含 emoji）</label>
    <input type="text" id="edit-trip-title" placeholder="🏝 澎湖三日遊">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeTitleModal()">取消</button>
      <button class="btn-save" onclick="saveTripTitle()">儲存</button>
    </div>
  </div>
</div>

<!-- Subtitle Edit Modal -->
<div class="modal-overlay" id="subtitle-modal">
  <div class="modal">
    <h3>✏️ 編輯副標題</h3>
    <label>日期與住宿資訊</label>
    <input type="text" id="edit-subtitle" placeholder="4/26（五）— 4/28（日）· 鎖港郵局會館">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSubtitleModal()">取消</button>
      <button class="btn-save" onclick="saveSubtitle()">儲存</button>
    </div>
  </div>
</div>

<!-- Day Edit Modal -->
<div class="modal-overlay" id="day-modal">
  <div class="modal">
    <h3>✏️ 編輯天數資訊</h3>
    <label>天數標籤（如：Day 1 · 4/26（五））</label>
    <input type="text" id="edit-day-label" placeholder="Day 1 · 4/26（五）">
    <label>主題（如：抵達 · 夜遊市區）</label>
    <input type="text" id="edit-day-theme" placeholder="抵達 · 夜遊市區">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDayModal()">取消</button>
      <button class="btn-save" onclick="saveDayInfo()">儲存</button>
    </div>
  </div>
</div>

<!-- Image Export Modal -->
<div class="modal-overlay img-export-modal" id="img-export-modal">
  <div class="modal">
    <h3>🖼️ 匯出圖片</h3>
    <p style="font-size:0.8rem;color:var(--mid);margin-bottom:12px;">選擇要匯出的天數，每天產出一張 PNG 圖片，方便分享到 LINE 群組。</p>
    <div class="img-day-list" id="img-day-list"></div>
    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn-cancel" onclick="closeImgExport()">關閉</button>
      <button class="btn-save" onclick="exportAllDaysImg()">📥 全部下載</button>
    </div>
  </div>
</div>

<!-- Progress overlay -->
<div class="progress-overlay" id="progress-overlay">
  <div class="progress-text" id="progress-text">正在產生圖片…</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
