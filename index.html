<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">澎湖三日遊 · 互動行程</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- html2canvas for image export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style id="main-style">
:root {
  --ocean: #1a6b8a;
  --sky: #5aa8c8;
  --sky-light: #a8d4e8;
  --sand: #f5ede0;
  --coral: #e07a5f;
  --dark: #1c2b35;
  --mid: #4a6274;
  --light: #eaf4f8;
  --white: #ffffff;
  --border: #cce0ea;
  --green: #2d9e6b;
  --green-bg: #d8f0e4;
  --amber: #8a6200;
  --amber-bg: #fef3cd;
  --amber-light: #b07c20;
  --amber-light-bg: #fff8e6;
  --red: #9b3020;
  --red-bg: #fce4e0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: #e8f4f8;
  min-height: 100vh;
  color: var(--dark);
  overflow-x: hidden;
}

/* ── NAV ── */
.nav {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(26,107,138,0.97);
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  padding: 0 12px;
  height: 56px;
  gap: 4px;
  box-shadow: 0 2px 16px rgba(26,107,138,0.25);
  flex-wrap: nowrap;
  overflow: visible;
}
.nav-title {
  font-family: 'Noto Serif TC', serif;
  color: white;
  font-size: 1rem;
  font-weight: 700;
  margin-right: auto;
  letter-spacing: 0.05em;
  white-space: nowrap;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.nav-title:hover { opacity: 0.85; }
.nav-title-edit-icon { font-size: 0.7rem; opacity: 0.7; }
.nav-btn {
  background: rgba(255,255,255,0.15);
  border: none;
  color: white;
  padding: 7px 12px;
  border-radius: 20px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: background 0.2s;
  letter-spacing: 0.03em;
  white-space: nowrap;
  flex-shrink: 0;
}
.nav-btn:hover { background: rgba(255,255,255,0.28); }
.nav-btn.active { background: white; color: var(--ocean); font-weight: 600; }

/* Export dropdown */
.export-wrap {
  position: relative;
  flex-shrink: 0;
  margin-left: 4px;
}
.nav-export {
  background: var(--coral);
  border: none;
  color: white;
  padding: 7px 12px;
  border-radius: 20px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: background 0.2s;
  font-weight: 600;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 4px;
}
.nav-export:hover { background: #c8664d; }
.export-menu {
  display: none;
  position: fixed;
  top: 56px;
  right: 12px;
  background: white;
  border-radius: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  padding: 6px;
  min-width: 180px;
  z-index: 9999;
}
.export-menu.open { display: block; }
.export-menu-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  border-radius: 10px;
  font-size: 0.82rem;
  color: var(--dark);
  cursor: pointer;
  transition: background 0.15s;
  font-family: 'Noto Sans TC', sans-serif;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.export-menu-item:hover { background: var(--light); color: var(--ocean); }
.export-menu-item .em-icon { font-size: 1rem; }
.export-menu-sep {
  height: 1px;
  background: var(--border);
  margin: 4px 8px;
}

/* ── PAGES ── */
.page { display: none; padding: 24px 16px 80px; max-width: 720px; margin: 0 auto; }
.page.active { display: block; }

/* ── HEADER ── */
.header {
  text-align: center;
  margin-bottom: 28px;
}
.header h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--ocean);
  letter-spacing: 0.08em;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.header h1:hover { opacity: 0.8; }
.header .subtitle {
  font-size: 0.83rem;
  color: var(--mid);
  margin-top: 6px;
  letter-spacing: 0.04em;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.header .subtitle:hover { opacity: 0.75; }
.edit-hint {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #fff8e6;
  border: 1px solid #f0d890;
  color: #7a5c00;
  font-size: 0.75rem;
  padding: 5px 12px;
  border-radius: 20px;
  margin-top: 10px;
}

/* Add Day Button */
.add-day-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  max-width: 720px;
  margin: 0 auto 24px;
  padding: 14px;
  background: white;
  border: 2px dashed var(--border);
  border-radius: 20px;
  color: var(--mid);
  font-size: 0.85rem;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.2s;
}
.add-day-btn:hover { border-color: var(--sky); color: var(--ocean); background: var(--light); }

/* ── DAY CARD ── */
.day-card {
  background: var(--white);
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 24px;
  box-shadow: 0 4px 24px rgba(26,107,138,0.10);
}
.day-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 16px 12px;
  background: linear-gradient(90deg, var(--ocean) 0%, var(--sky) 100%);
  color: white;
}
.day-badge {
  font-family: 'Noto Serif TC', serif;
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
}
.day-badge:hover { opacity: 0.85; }
.day-theme-tag {
  font-size: 0.75rem;
  opacity: 0.9;
  background: rgba(255,255,255,0.18);
  padding: 3px 9px;
  border-radius: 20px;
  cursor: pointer;
}
.day-theme-tag:hover { background: rgba(255,255,255,0.3); }
.day-header-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
}
.day-map-btn {
  background: rgba(255,255,255,0.22);
  border: 1px solid rgba(255,255,255,0.4);
  color: white;
  padding: 4px 10px;
  border-radius: 14px;
  font-size: 0.72rem;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  transition: background 0.2s;
  white-space: nowrap;
}
.day-map-btn:hover { background: rgba(255,255,255,0.35); }
.day-delete-btn {
  background: rgba(255,100,80,0.3);
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  font-size: 0.75rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  flex-shrink: 0;
}
.day-delete-btn:hover { background: rgba(255,80,60,0.6); }

/* ── STOPS ── */
.stops { padding: 8px 0 10px; }
.stop-row {
  display: flex;
  align-items: stretch;
  padding: 0 16px;
  position: relative;
}
.stop-row:hover .stop-content { background: #f7fbfd; border-radius: 12px; }
.stop-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 30px;
  flex-shrink: 0;
  margin-right: 12px;
}
.stop-num {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--ocean);
  color: white;
  font-size: 0.72rem;
  font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 12px;
}
.stop-line {
  width: 2px;
  background: var(--border);
  flex: 1;
  margin-top: 4px;
}
.stop-row.last .stop-line { display: none; }

/* Transit */
.transit-row {
  display: flex;
  align-items: center;
  padding: 0 16px;
}
.transit-left {
  display: flex; flex-direction: column; align-items: center;
  width: 30px; flex-shrink: 0; margin-right: 12px;
}
.transit-line-top { width: 2px; height: 6px; background: var(--border); }
.transit-icon-wrap {
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  background: var(--light); border-radius: 50%;
  font-size: 0.65rem; color: var(--sky);
  border: 1.5px dashed var(--sky);
  flex-shrink: 0;
}
.transit-line-bot { width: 2px; flex: 1; min-height: 6px; background: var(--border); }
.transit-info {
  font-size: 0.74rem;
  color: var(--mid);
  padding: 4px 0;
  display: flex; align-items: center; gap: 8px;
}
.transit-dur {
  background: var(--light);
  color: var(--ocean);
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.71rem;
  cursor: pointer;
  transition: background 0.2s;
  border: 1px solid transparent;
}
.transit-dur:hover { background: #d0eaf5; border-color: var(--sky); }

/* Stop content */
.stop-content {
  flex: 1;
  padding: 10px 8px 8px 0;
  cursor: pointer;
  transition: background 0.15s;
}
.stop-name {
  font-family: 'Noto Serif TC', serif;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--dark);
  line-height: 1.3;
  display: flex;
  align-items: center;
  gap: 8px;
}
.stop-name .edit-icon {
  opacity: 0;
  font-size: 0.7rem;
  color: var(--sky);
  transition: opacity 0.15s;
}
.stop-content:hover .edit-icon { opacity: 1; }
.stop-meta {
  display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap;
}
.tag {
  font-size: 0.69rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 400;
  letter-spacing: 0.02em;
}
.tag-depart  { background: var(--amber-bg); color: var(--amber); }
.tag-arrive  { background: var(--amber-bg); color: var(--amber); }
.tag-leave   { background: var(--amber-light-bg); color: var(--amber-light); }
.tag-stay    { background: var(--green-bg); color: var(--green); }
.tag-note    { background: var(--red-bg);   color: var(--red);   }

/* Move stop buttons */
.stop-move-wrap {
  display: flex;
  flex-direction: column;
  gap: 2px;
  align-self: center;
  margin-top: 0;
  opacity: 0;
  transition: opacity 0.15s;
}
.stop-row:hover .stop-move-wrap { opacity: 1; }
.stop-move-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--mid);
  width: 22px;
  height: 22px;
  border-radius: 6px;
  font-size: 0.65rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  padding: 0;
}
.stop-move-btn:hover { background: var(--light); border-color: var(--sky); color: var(--ocean); }
.stop-move-btn:disabled { opacity: 0.2; cursor: default; pointer-events: none; }

/* Delete button */
.stop-delete {
  opacity: 0;
  background: none;
  border: none;
  color: #ccc;
  cursor: pointer;
  padding: 0 4px;
  font-size: 1rem;
  align-self: flex-start;
  margin-top: 12px;
  transition: color 0.15s, opacity 0.15s;
}
.stop-row:hover .stop-delete { opacity: 1; }
.stop-delete:hover { color: var(--coral); }

/* Add stop button */
.add-stop-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 4px 16px 12px 58px;
  background: none;
  border: 1.5px dashed var(--border);
  color: var(--mid);
  padding: 6px 14px;
  border-radius: 12px;
  font-size: 0.78rem;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.2s;
}
.add-stop-btn:hover { border-color: var(--sky); color: var(--ocean); background: var(--light); }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white;
  border-radius: 20px;
  padding: 24px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  max-height: 90vh;
  overflow-y: auto;
}
.modal h3 {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.05rem;
  color: var(--ocean);
  margin-bottom: 16px;
}
.modal label {
  display: block;
  font-size: 0.78rem;
  color: var(--mid);
  margin-bottom: 4px;
  margin-top: 12px;
}
.modal input, .modal select, .modal textarea {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 8px 12px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.88rem;
  color: var(--dark);
  outline: none;
  transition: border-color 0.2s;
  background: white;
}
.modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--sky); }
.modal-row { display: flex; gap: 8px; }
.modal-row > * { flex: 1; }
.modal-actions {
  display: flex; gap: 10px; margin-top: 20px;
}
.btn-cancel {
  flex: 1; padding: 9px; border-radius: 12px;
  border: 1.5px solid var(--border);
  background: none; color: var(--mid);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.85rem; cursor: pointer;
}
.btn-save {
  flex: 2; padding: 9px; border-radius: 12px;
  border: none; background: var(--ocean); color: white;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.85rem; font-weight: 600; cursor: pointer;
  transition: background 0.2s;
}
.btn-save:hover { background: #155a76; }
.btn-danger {
  flex: 1; padding: 9px; border-radius: 12px;
  border: none; background: #fce4e0; color: var(--red);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.85rem; font-weight: 600; cursor: pointer;
}

/* Transit modal */
.transit-modal .modal { max-width: 300px; }

/* ── MAP PAGE ── */
.map-page-header {
  text-align: center;
  margin-bottom: 16px;
}
.map-page-header h2 {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.4rem;
  color: var(--ocean);
}
.map-page-header p {
  font-size: 0.8rem;
  color: var(--mid);
  margin-top: 4px;
}
.map-day-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  justify-content: center;
  flex-wrap: wrap;
}
.map-day-tab {
  padding: 8px 18px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: white;
  color: var(--mid);
  font-size: 0.82rem;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.2s;
}
.map-day-tab.active {
  background: var(--ocean);
  border-color: var(--ocean);
  color: white;
  font-weight: 600;
}

/* ── LEAFLET MAP ── */
#leaflet-map {
  width: 100%;
  height: 380px;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(26,107,138,0.15);
  margin-bottom: 16px;
  background: var(--light);
  z-index: 1;
}
/* Leaflet z-index fix (below modal) */
.leaflet-pane { z-index: 10 !important; }
.leaflet-top, .leaflet-bottom { z-index: 20 !important; }

/* Map loading overlay */
.map-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--mid);
  font-size: 0.85rem;
  gap: 10px;
}
.map-loading-spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--ocean);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Leaflet custom marker label */
.map-label-marker {
  background: var(--ocean);
  color: white;
  border-radius: 50%;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif;
  border: 2px solid white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.map-label-marker.geocode-fail {
  background: #999;
}

/* ── MAP STOP LIST (Inline Edit) ── */
.map-stop-list {
  background: white;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 2px 12px rgba(26,107,138,0.08);
  margin-bottom: 14px;
}
.map-stop-list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.map-stop-list-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--ocean);
}
.map-add-stop-btn {
  background: var(--light);
  border: 1.5px dashed var(--border);
  color: var(--ocean);
  font-size: 0.75rem;
  padding: 4px 12px;
  border-radius: 12px;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.2s;
}
.map-add-stop-btn:hover { background: var(--sky-light); border-color: var(--sky); }

/* Map stop row */
.map-stop-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 6px;
  border-radius: 10px;
  transition: background 0.15s;
  position: relative;
}
.map-stop-row:hover { background: #f7fbfd; }
.map-stop-row:hover .map-stop-actions { opacity: 1; }

.map-stop-letter {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--ocean);
  color: white;
  font-size: 0.75rem;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-family: 'Noto Sans TC', sans-serif;
}
.map-stop-letter.geocode-fail { background: #aaa; }

/* Inline editable fields */
.map-stop-name-wrap { flex: 1; min-width: 0; }
.map-inline-name {
  font-family: 'Noto Serif TC', serif;
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--dark);
  cursor: text;
  padding: 2px 6px;
  border-radius: 6px;
  border: 1.5px solid transparent;
  width: 100%;
  background: transparent;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: border-color 0.2s, background 0.2s;
  outline: none;
  font-family: 'Noto Serif TC', serif;
}
.map-inline-name:hover { border-color: var(--border); background: white; }
.map-inline-name:focus { border-color: var(--sky); background: white; }

.map-stop-note {
  font-size: 0.7rem;
  color: var(--mid);
  padding: 0 6px;
  margin-top: 1px;
}

/* Time fields */
.map-stop-times {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
  flex-shrink: 0;
}
.map-inline-time {
  font-size: 0.75rem;
  color: var(--amber);
  background: var(--amber-bg);
  border: 1.5px solid transparent;
  border-radius: 8px;
  padding: 2px 7px;
  cursor: text;
  outline: none;
  font-family: 'Noto Sans TC', sans-serif;
  width: 80px;
  text-align: center;
  transition: border-color 0.2s;
}
.map-inline-time:hover { border-color: var(--amber); }
.map-inline-time:focus { border-color: var(--ocean); background: white; color: var(--dark); }

.map-stop-arrive {
  font-size: 0.68rem;
  color: var(--mid);
  text-align: right;
  padding-right: 2px;
}

/* Action buttons */
.map-stop-actions {
  display: flex;
  flex-direction: column;
  gap: 2px;
  opacity: 0;
  transition: opacity 0.15s;
  flex-shrink: 0;
}
.map-action-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--mid);
  width: 20px; height: 20px;
  border-radius: 5px;
  font-size: 0.6rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  padding: 0;
}

let _memStore = {}; // file:// 環境的記憶體備用
function storageGet(key) {
  try { return localStorage.getItem(key); } catch(e) { return _memStore[key] || null; }
}
function storageSet(key, val) {
  try { localStorage.setItem(key, val); } catch(e) { _memStore[key] = val; }
}
function storageRemove(key) {
  try { localStorage.removeItem(key); } catch(e) { delete _memStore[key]; }
}

// ═══════════════════════════════════════════
// LOAD / SAVE
// ═══════════════════════════════════════════
function loadData() {
  try {
    const saved = storageGet(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch (e) {
    console.warn('無法讀取儲存，使用預設資料', e);
  }
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveData() {
  try {
    storageSet(STORAGE_KEY, JSON.stringify(data));
    showToast('💾 已儲存至本機！');
    document.getElementById('export-menu').classList.remove('open');
  } catch (e) {
    showToast('⚠️ 儲存失敗');
    console.error('儲存失敗', e);
  }
}

let data = loadData();

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function timeToMinutes(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function minutesToTime(mins) {
  const h = Math.floor(mins / 60) % 24;
  const m = mins % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function stayLabel(mins) {
  if (!mins) return null;
  if (mins < 60) return `停留 ${mins} 分鐘`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m ? `停留 ${h} 小時 ${m} 分` : `停留 ${h} 小時`;
}

// 重新計算從 fromIdx 之後的所有時間
function recalcTimes(dayIdx, fromIdx) {
  const day = data.days[dayIdx];
  const start = (fromIdx !== undefined) ? fromIdx : 0;
  for (let i = start; i < day.stops.length - 1; i++) {
    const leaveMins   = timeToMinutes(day.stops[i].depart);
    const driveMins   = day.drives[i] || 0;
    const nextArrMins = leaveMins + driveMins;
    const nextStay    = day.stops[i + 1].stay || 0;
    day.stops[i + 1].depart = minutesToTime(nextArrMins + nextStay);
  }
}

// 修改後同步地圖（如果地圖頁是 active）
function syncMapIfActive(di) {
  const mapPage = document.getElementById('page-map');
  if (mapPage.classList.contains('active')) {
    if (di === currentMapDay) {
      renderMapStopList();
      refreshMapMarkers();
    }
  }
}

    const leaveTag = !isLast

function _stopToPlace(stopName) {
  const clean = stopName.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFE0F\u{1F900}-\u{1F9FF}]/gu, '').trim();
  if (/澎湖|馬公|西嶼|湖西|白沙|望安|七美/.test(clean)) return clean;
  return clean + ' 澎湖';
}
function _buildNavURL(di) {
  const places = data.days[di].stops.map(s => _stopToPlace(s.name));
  return `https://www.google.com/maps/dir/${places.map(p => encodeURIComponent(p)).join('/')}`;
}

function renderNavCard(di) {
  const day    = data.days[di];
  const stops  = day.stops;
  const navURL = _buildNavURL(di);
  const cleanName = name => name.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFE0F\u{1F900}-\u{1F9FF}]/gu, '').trim();
  const routeChips = stops.map((s, i) => {
    const n = cleanName(s.name);
    const label = n.length > 8 ? n.slice(0, 8) + '…' : n;
    return `<span class="nav-card-chip"><span class="nav-card-chip-num">${i + 1}</span>${label}</span>${i < stops.length - 1 ? '<span class="nav-card-arrow">›</span>' : ''}`;
  }).join('');

  document.getElementById(`nav-card-${di}`).innerHTML = `
    <div class="nav-card-inner">
      <div class="nav-card-route">${routeChips}</div>
      <a class="nav-card-btn" href="${navURL}" target="_blank">
        <span class="nav-card-btn-icon">🗺</span>
        <span>開啟 Google Maps 導航</span>
        <span class="nav-card-btn-arrow">↗</span>
      </a>
    </div>
  `;
}

// ═══════════════════════════════════════════
// GEOCODING (Nominatim — 免費，無需 API Key)
// ═══════════════════════════════════════════
const geocodeCache = {}; // { "景點名稱": {lat, lng} | null }
const geocodeQueue = []; // [{ key, resolve }]
let geocodeBusy = false;

// Nominatim 規定每秒最多 1 次請求
async function _drainQueue() {
  if (geocodeBusy || geocodeQueue.length === 0) return;
  geocodeBusy = true;
  const { key, resolve } = geocodeQueue.shift();
  try {
    const q = encodeURIComponent(key);
    const url = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&accept-language=zh-TW`;
    const res = await fetch(url, {
      headers: { 'User-Agent': 'TravelItineraryApp/1.0' }
    });
    const json = await res.json();
    if (json && json.length > 0) {
      geocodeCache[key] = { lat: parseFloat(json[0].lat), lng: parseFloat(json[0].lon) };
    } else {
      geocodeCache[key] = null;
    }
    resolve(geocodeCache[key]);
  } catch (e) {
    geocodeCache[key] = null;
    resolve(null);
  }
  geocodeBusy = false;
  setTimeout(_drainQueue, 1100); // 1.1 秒間隔，遵守 Nominatim 規定
}

function geocode(stopName, stopObj) {
  // 如果景點已有手動座標，直接回傳
  if (stopObj && stopObj.coords) {
    return Promise.resolve(stopObj.coords);
  }
  // 清除 emoji 後加上「澎湖」提升精準度
  const clean = stopName.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFE0F\u{1F900}-\u{1F9FF}]/gu, '').trim();
  const key = /澎湖|馬公|西嶼|湖西|白沙|望安|七美/.test(clean) ? clean : clean + ' 澎湖 台灣';

  if (key in geocodeCache) return Promise.resolve(geocodeCache[key]);

  return new Promise(resolve => {
    geocodeQueue.push({ key, resolve });
    _drainQueue();
  });
}

// MAP PAGE

let currentMapDay = 0;
let leafletMap = null;
let mapMarkers = [];
let mapPolyline = null;

// 字母標籤 A B C D...
function stopLetter(i) {
  return String.fromCharCode(65 + i); // A=65
}

function renderMap() {
  if (currentMapDay >= data.days.length) currentMapDay = 0;

  // Tab 列
  const tabsEl = document.getElementById('map-tabs');
  tabsEl.innerHTML = '';
  data.days.forEach((day, di) => {
    const btn = document.createElement('button');
    btn.className = `map-day-tab${di === currentMapDay ? ' active' : ''}`;
    btn.textContent = `Day ${di + 1} · ${day.label.split('·')[0].replace('Day','').trim() ? day.label : `Day ${di+1}`}`;
    btn.textContent = day.label;
    btn.onclick = () => { currentMapDay = di; renderMap(); };
    tabsEl.appendChild(btn);
  });

  // 初始化 Leaflet（只建立一次）
  if (!leafletMap) {
    leafletMap = L.map('leaflet-map', {
      center: [23.565, 119.579], // 澎湖
      zoom: 12,
      zoomControl: true,
    });
    // 使用台灣地圖（國土測繪圖磚，正體中文）
    // fallback 到 OpenStreetMap
    L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}', {
      attribution: '© <a href="https://maps.nlsc.gov.tw/">國土測繪中心</a> © <a href="https://www.openstreetmap.org/">OpenStreetMap</a>',
      maxZoom: 18,
      tileSize: 256,
      errorTileUrl: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    }).addTo(leafletMap);
  }

  renderMapStopList();
  refreshMapMarkers();
}

// 更新地圖上的標記與路線
async function refreshMapMarkers() {
  // 清除舊標記
  mapMarkers.forEach(m => leafletMap.removeLayer(m));
  mapMarkers = [];
  if (mapPolyline) { leafletMap.removeLayer(mapPolyline); mapPolyline = null; }

  const day   = data.days[currentMapDay];
  const stops = day.stops;
  const coords = [];

  // 取得所有座標（用 cache，沒有就排 queue）
  const promises = stops.map(s => geocode(s.name, s));
  // 逐步顯示已解析的點（不等全部完成）
  for (let i = 0; i < stops.length; i++) {
    promises[i].then(coord => {
      if (!coord) {
        // 更新清單中的 badge
        const badge = document.querySelector(`[data-map-badge="${i}"]`);
        if (badge) { badge.textContent = '找不到位置'; badge.className = 'map-geocode-badge fail'; }
        const letter = document.querySelector(`[data-map-letter="${i}"]`);
        if (letter) letter.classList.add('geocode-fail');
        return;
      }
      // 移除 loading badge
      const badge = document.querySelector(`[data-map-badge="${i}"]`);
      if (badge) badge.remove();

      // 建立自訂標記
      const icon = L.divIcon({
        className: '',
        html: `<div class="map-label-marker">${stopLetter(i)}</div>`,
        iconSize: [28, 28],
        iconAnchor: [14, 14],
        popupAnchor: [0, -14],
      });
      const marker = L.marker([coord.lat, coord.lng], { icon })
        .bindPopup(`<b>${stops[i].name}</b><br>${stops[i].depart}`)
        .addTo(leafletMap);
      mapMarkers.push(marker);

      // 累積座標，夠多時畫路線
      coords[i] = [coord.lat, coord.lng];
      drawPolylineIfReady(coords, stops.length);
    });
  }
}

function drawPolylineIfReady(coords, total) {
  const filled = coords.filter(Boolean);
  // 只要有 2 個以上就畫
  if (filled.length >= 2) {
    if (mapPolyline) leafletMap.removeLayer(mapPolyline);
    // 只取有值的座標，按順序（保留 index 順序）
    const orderedCoords = [];
    for (let j = 0; j < total; j++) {
      if (coords[j]) orderedCoords.push(coords[j]);
    }
    if (orderedCoords.length >= 2) {
      mapPolyline = L.polyline(orderedCoords, {
        color: '#1a6b8a',
        weight: 3,
        opacity: 0.75,
        dashArray: '8, 6',
      }).addTo(leafletMap);
      leafletMap.fitBounds(mapPolyline.getBounds(), { padding: [40, 40] });
    }
  }
}

// MAP STOP LIST (Inline Edit)
// ═══════════════════════════════════════════
function renderMapStopList() {
  const day    = data.days[currentMapDay];
  const stops  = day.stops;
  const drives = day.drives;
  const listEl = document.getElementById('map-stop-list');
  const navEl  = document.getElementById('map-nav-btn-wrap');

  listEl.innerHTML = `
    <div class="map-stop-list-header">
      <span class="map-stop-list-title">📍 ${day.label} · ${day.theme}</span>
      <button class="map-add-stop-btn" onclick="mapAddStop()">＋ 新增景點</button>
    </div>
  `;

  stops.forEach((stop, si) => {
    const isLast = si === stops.length - 1;

    // 計算抵達時間
    let arriveStr = '';
    if (si > 0) {
      const prev = stops[si - 1];
      const drv  = drives[si - 1] || 0;
      arriveStr = minutesToTime(timeToMinutes(prev.depart) + drv);
    }

    // 是否正在 geocoding
    const cleanName = stop.name.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFE0F\u{1F900}-\u{1F9FF}]/gu, '').trim();
    const geoKey = /澎湖|馬公|西嶼|湖西|白沙|望安|七美/.test(cleanName) ? cleanName : cleanName + ' 澎湖 台灣';
    const geoStatus = (geoKey in geocodeCache)
      ? (geocodeCache[geoKey] ? 'ok' : 'fail')
      : 'loading';

    const badgeHTML = stop.coords
      ? `<span class="map-geocode-badge manual" data-map-badge="${si}" title="已設定手動座標">📍 已設定座標</span>`
      : geoStatus === 'loading'
      ? `<span class="map-geocode-badge loading" data-map-badge="${si}">定位中…</span>`
      : geoStatus === 'fail'
      ? `<span class="map-geocode-badge fail" data-map-badge="${si}" title="Nominatim 找不到此地名，地圖上不會顯示">找不到位置</span>`
      : '';

    // 景點行
    const row = document.createElement('div');
    row.className = 'map-stop-row';
    row.dataset.si = si;
    row.innerHTML = `
      <div class="map-stop-letter${geoStatus === 'fail' ? ' geocode-fail' : ''}" data-map-letter="${si}">${stopLetter(si)}</div>
      <div class="map-stop-name-wrap">
        <input class="map-inline-name" value="${escHtml(stop.name)}" data-si="${si}" data-field="name"
          title="點擊編輯景點名稱"
          onblur="mapInlineSaveName(${si}, this.value)"
          onkeydown="if(event.key==='Enter'){this.blur();}">
        ${stop.note ? `<div class="map-stop-note">${escHtml(stop.note)}</div>` : ''}
        <div class="map-coords-row">
          <input class="map-inline-coords"
            value="${stop.coords ? stop.coords.lat + ', ' + stop.coords.lng : ''}"
            placeholder="貼上座標，如：23.5712, 119.5634"
            title="從 Google Maps 右鍵複製座標貼上"
            onblur="mapInlineSaveCoords(${si}, this.value)"
            onkeydown="if(event.key==='Enter'){this.blur();}">
          ${badgeHTML}
        </div>
      </div>
      <div class="map-stop-times">
        ${arriveStr ? `<div class="map-stop-arrive">抵達 ${arriveStr}</div>` : ''}
        <input class="map-inline-time" value="${stop.depart}" data-si="${si}"
          title="點擊編輯離開時間"
          onblur="mapInlineSaveDepart(${si}, this.value)"
          onkeydown="if(event.key==='Enter'){this.blur();}">
      </div>
      <div class="map-stop-actions">
        <a class="map-action-btn map-action-google" href="https://www.google.com/maps/search/${encodeURIComponent(_stopToPlace(stop.name))}" target="_blank" title="在 Google Maps 搜尋此景點（可複製座標）">🔍</a>
        <button class="map-action-btn" onclick="mapMoveStop(${si},-1)" title="上移" ${si===0?'disabled':''}>▲</button>
        <button class="map-action-btn" onclick="mapMoveStop(${si},1)" title="下移" ${isLast?'disabled':''}>▼</button>
        <button class="map-action-btn del" onclick="mapDeleteStop(${si})" title="刪除">✕</button>
      </div>
    `;
    listEl.appendChild(row);

    // 車程行
    if (!isLast) {
      const tr = document.createElement('div');
      tr.className = 'map-transit-row';
      tr.innerHTML = `
        <span class="map-transit-label">🚗</span>
        <input class="map-inline-drive" value="約 ${drives[si]} 分鐘" data-si="${si}"
          title="點擊編輯車程時間"
          onfocus="this.value='${drives[si]}'; this.select();"
          onblur="mapInlineSaveDrive(${si}, this.value)"
          onkeydown="if(event.key==='Enter'){this.blur();}">
        <span class="map-transit-label">→ 抵達 ${minutesToTime(timeToMinutes(stop.depart) + (drives[si]||0))}</span>
      `;
      listEl.appendChild(tr);
    }
  });

  // 導航按鈕
  navEl.innerHTML = `
    <div class="map-nav-bottom">
      <a class="map-nav-hero-btn" href="${_buildNavURL(currentMapDay)}" target="_blank">
        🗺 在 Google Maps 開啟導航 ↗
      </a>
    </div>
  `;
}

// HTML escape
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Map inline save handlers ──

function mapInlineSaveName(si, val) {
  const di = currentMapDay;
  val = val.trim();
  if (!val) return;
  const oldName = data.days[di].stops[si].name;
  if (val === oldName) return;
  // 新名稱清除 cache（需重新 geocode）
  const cleanOld = oldName.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFE0F\u{1F900}-\u{1F9FF}]/gu,'').trim();
  delete geocodeCache[cleanOld];
  delete geocodeCache[cleanOld + ' 澎湖 台灣'];
  data.days[di].stops[si].name = val;
  // 同步行程頁
  renderStops(di);
  renderNavCard(di);
  // 同步地圖清單與標記
  renderMapStopList();
  refreshMapMarkers();
  showToast('✅ 景點名稱已更新');
}

function mapInlineSaveDepart(si, val) {
  const di = currentMapDay;
  if (!/^\d{1,2}:\d{2}$/.test(val)) {
    // 恢復原值
    renderMapStopList();
    showToast('⚠️ 時間格式錯誤，請輸入 HH:MM');
    return;
  }
  const hh = val.padStart(5, '0');
  data.days[di].stops[si].depart = hh;
  recalcTimes(di, si);
  renderStops(di);
  renderNavCard(di);
  renderMapStopList();
  showToast('⏱ 時間已更新，後續景點自動重新計算');
}

function mapInlineSaveDrive(si, val) {
  const di = currentMapDay;
  const mins = parseInt(val);
  if (isNaN(mins) || mins < 1) {
    renderMapStopList();
    return;
  }
  data.days[di].drives[si] = mins;
  recalcTimes(di, si);
  renderStops(di);
  renderNavCard(di);
  renderMapStopList();
  showToast('🚗 車程已更新');
}

function mapInlineSaveCoords(si, val) {
  const di = currentMapDay;
  const stop = data.days[di].stops[si];
  val = val.trim();
  if (!val) {
    // 清除座標
    delete stop.coords;
    const cleanName = stop.name.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFE0F\u{1F900}-\u{1F9FF}]/gu,'').trim();
    const geoKey = /澎湖|馬公|西嶼|湖西|白沙|望安|七美/.test(cleanName) ? cleanName : cleanName + ' 澎湖 台灣';
    delete geocodeCache[geoKey];
    renderMapStopList();
    refreshMapMarkers();
    showToast('🗑 已清除座標');
    return;
  }
  const m = val.match(/^(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)$/);
  if (!m) {
    showToast('⚠️ 格式錯誤，請輸入如：23.5712, 119.5634');
    renderMapStopList();
    return;
  }
  const lat = parseFloat(m[1]), lng = parseFloat(m[2]);
  stop.coords = { lat, lng };
  // 注入 geocodeCache
  const cleanName = stop.name.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFE0F\u{1F900}-\u{1F9FF}]/gu,'').trim();
  const geoKey = /澎湖|馬公|西嶼|湖西|白沙|望安|七美/.test(cleanName) ? cleanName : cleanName + ' 澎湖 台灣';
  geocodeCache[geoKey] = { lat, lng };
  renderMapStopList();
  refreshMapMarkers();
  showToast('📍 座標已設定，地圖已更新！');
}

function mapMoveStop(si, dir) {
  const di = currentMapDay;
  const day = data.days[di];
  const targetIdx = si + dir;
  if (targetIdx < 0 || targetIdx >= day.stops.length) return;
  [day.stops[si], day.stops[targetIdx]] = [day.stops[targetIdx], day.stops[si]];
  const driveIdx = dir === 1 ? si : si - 1;
  if (driveIdx >= 0 && driveIdx + 1 < day.drives.length) {
    [day.drives[driveIdx], day.drives[driveIdx + 1]] = [day.drives[driveIdx + 1], day.drives[driveIdx]];
  }
  recalcTimes(di);
  renderStops(di);
  renderNavCard(di);
  renderMapStopList();
  refreshMapMarkers();
  showToast('↕️ 景點已移動');
}

function mapDeleteStop(si) {

  const day = data.days[di];
  if (day.stops.length <= 2) { showToast('⚠️ 至少需要保留 2 個景點'); return; }
  day.stops.splice(si, 1);

let editTarget = null;

  document.getElementById('coords-hint').textContent = coords ? `✅ 已設定座標，地圖將直接定位` : '';
  document.getElementById('coords-hint').style.color = 'var(--green)';
  document.getElementById('stop-modal').classList.add('open');
  updateModalHint();
}

function getArrivalMins() {
  if (!editTarget) return null;
  const { di, si } = editTarget;
  const day = data.days[di];
  if (si === 0) return null;
  const prevStop = day.stops[si - 1];
  const drive = day.drives[si - 1] || 0;
  return timeToMinutes(prevStop.depart) + drive;
}

function onStayChange() {
  if (!editTarget) return;
  const stayVal = parseInt(document.getElementById('edit-stay').value);
  if (isNaN(stayVal) || stayVal < 0) return;
  const arrivalMins = getArrivalMins();
  if (arrivalMins === null) return;
  document.getElementById('edit-depart').value = minutesToTime(arrivalMins + stayVal);
  updateModalHint();
}

function onDepartChange() {
  if (!editTarget) return;
  const departVal = document.getElementById('edit-depart').value;
  if (!departVal) return;
  const arrivalMins = getArrivalMins();
  if (arrivalMins === null) return;
  const stayMins = Math.max(0, timeToMinutes(departVal) - arrivalMins);
  document.getElementById('edit-stay').value = stayMins;
  updateModalHint();
}

function updateModalHint() {
  const hint = document.getElementById('modal-arrival-hint');
  if (!editTarget) { hint.textContent = ''; return; }
  const { di, si } = editTarget;
  const day = data.days[di];
  const arrivalMins = getArrivalMins();
  const departVal = document.getElementById('edit-depart').value;
  if (!departVal) { hint.textContent = ''; return; }
  const leaveMins = timeToMinutes(departVal);
  const drive = day.drives[si] || 0;
  const isLast = si === day.stops.length - 1;
  const stayVal = parseInt(document.getElementById('edit-stay').value) || 0;
  let hint1 = arrivalMins !== null ? `抵達 ${minutesToTime(arrivalMins)}` : '';
  let hint2 = stayVal ? `停留 ${stayVal} 分鐘後 ${minutesToTime(leaveMins)} 離開` : `${minutesToTime(leaveMins)} 離開`;
  let hint3 = (!isLast && drive) ? `→ 下一站約 ${minutesToTime(leaveMins + drive)} 抵達` : '';
  hint.textContent = [hint1, hint2, hint3].filter(Boolean).join('　');
}

function saveStop() {
  const { di, si } = editTarget;
  const stop = data.days[di].stops[si];
  const newName = document.getElementById('edit-name').value || stop.name;
  // 名稱變更時清除 geocode cache
  if (newName !== stop.name) {
    const cleanOld = stop.name.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFE0F\u{1F900}-\u{1F9FF}]/gu,'').trim();
    delete geocodeCache[cleanOld];
    delete geocodeCache[cleanOld + ' 澎湖 台灣'];
  }
  stop.name = newName;
  stop.note = document.getElementById('edit-note').value;
  stop.depart = document.getElementById('edit-depart').value || stop.depart;
  stop.stay = parseInt(document.getElementById('edit-stay').value) || 0;

  // 解析手動座標
  const rawCoords = document.getElementById('edit-coords').value.trim();
  if (rawCoords) {
    const m = rawCoords.match(/^(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)$/);
    if (m) {
      const lat = parseFloat(m[1]), lng = parseFloat(m[2]);
      stop.coords = { lat, lng };
      // 注入 geocodeCache，地圖直接用這個，不再 geocode
      const cleanName = newName.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFE0F\u{1F900}-\u{1F9FF}]/gu,'').trim();
      const geoKey = /澎湖|馬公|西嶼|湖西|白沙|望安|七美/.test(cleanName) ? cleanName : cleanName + ' 澎湖 台灣';
      geocodeCache[geoKey] = { lat, lng };
    } else {
      showToast('⚠️ 座標格式錯誤，請輸入如：23.5712, 119.5634');
      return;
    }
  } else {
    // 清除舊座標（若之前有設定）
    delete stop.coords;
  }
  recalcTimes(di, si);
  closeModal();
  renderStops(di);
  renderNavCard(di);
  syncMapIfActive(di);
  showToast('✅ 已儲存，時間已重新計算');
}

  document.getElementById('stop-modal').classList.remove('open');
  editTarget = null;
}

function exportJSON() {

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const safeName = data.title.replace(/[\u{1F300}-\u{1FFFF}\s]/gu, '').replace(/[^\w\u4e00-\u9fff]/g, '') || '旅遊行程';
  a.download = `${safeName}行程.json`;
  a.click();
  showToast('📋 JSON 已匯出！');
}

function importJSON() {
  document.getElementById('export-menu').classList.remove('open');
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.title || !Array.isArray(parsed.days)) {
          showToast('⚠️ JSON 格式不正確');
          return;
        }
        data = parsed;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        renderAll();
        showToast(`✅ 已匯入「${data.title}」，共 ${data.days.length} 天行程！`);
      } catch(err) {
        showToast('⚠️ 讀取 JSON 失敗');
        console.error('JSON 匯入失敗', err);
      }
    };
    reader.readAsText(file, 'utf-8');
  };
  input.click();
}

}

function buildCaptureHTML(di) {
  const day = data.days[di];
  let stopsHTML = '';
  day.stops.forEach((stop, si) => {
    const isLast = si === day.stops.length - 1;
    const noteTag = stop.note ? `<span class="tag tag-note">${stop.note}</span>` : '';
    let arriveTag = '';
    if (si > 0) {
      const prevStop = day.stops[si - 1];
      const drive = day.drives[si - 1] || 0;
      const arrMins = timeToMinutes(prevStop.depart) + drive;
      arriveTag = `<span class="tag tag-arrive">抵達 ${minutesToTime(arrMins)}</span>`;
    }
    const leaveTag = !isLast
      ? `<span class="tag tag-leave">離開 ${stop.depart}</span>`
      : `<span class="tag tag-arrive">抵達 ${stop.depart}</span>`;
    stopsHTML += `
      <div class="capture-stop-row ${isLast ? 'cap-last' : ''}">
        <div class="cap-left">
          <div class="cap-num">${si + 1}</div>
          <div class="cap-line"></div>
        </div>
        <div class="cap-content">
          <div class="cap-name">${stop.name}</div>
          <div class="cap-tags">${arriveTag}${leaveTag}${noteTag}</div>
        </div>
      </div>
    `;
    if (!isLast) {
      stopsHTML += `<div class="cap-transit"><span class="cap-transit-text">🚗 約 ${day.drives[si]} 分鐘</span></div>`;
    }
  });

  const card = document.createElement('div');
  card.className = 'capture-card';
  card.style.cssText = 'position:fixed;left:-9999px;top:0;width:680px;';
  card.innerHTML = `
    <div class="capture-header">
      <span class="ch-emoji">🏝</span>
      <div class="ch-title">${data.title.replace(/^[\p{Emoji}\s]+/u,'')}</div>
      <div class="ch-sub">${data.subtitle}</div>
      <div class="ch-day">🗓 ${day.label} · ${day.theme}</div>
    </div>
    <div class="capture-body">${stopsHTML}</div>
    <div class="capture-footer">由互動行程產生 · ${data.title}</div>
  `;
  return card;
}

async function exportDayImg(di) {
  closeImgExport();
  showProgress(`正在產生 Day ${di + 1} 圖片…`, 30);
  await new Promise(r => setTimeout(r, 100));
  const card = buildCaptureHTML(di);
  document.body.appendChild(card);
  try {
    showProgress('正在渲染…', 60);
    await new Promise(r => setTimeout(r, 200));
    const canvas = await html2canvas(card, { scale: 2, useCORS: true, backgroundColor: '#ffffff', width: 680, logging: false });
    showProgress('正在下載…', 90);
    const a = document.createElement('a');
    const safeName = data.title.replace(/[\u{1F300}-\u{1FFFF}\s]/gu,'').replace(/[^\w\u4e00-\u9fff]/g,'') || '行程';
    a.download = `${safeName}_Day${di + 1}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
    hideProgress();
    showToast(`🖼️ Day ${di + 1} 圖片已下載！`);
  } catch(e) {
    hideProgress();
    showToast('⚠️ 圖片產生失敗，請重試');
  } finally {
    document.body.removeChild(card);
  }
}

async function exportAllDaysImg() {
  closeImgExport();
  const total = data.days.length;
  for (let di = 0; di < total; di++) {
    showProgress(`正在產生 Day ${di + 1} / ${total} 圖片…`, Math.round((di / total) * 100));
    await new Promise(r => setTimeout(r, 150));
    const card = buildCaptureHTML(di);
    document.body.appendChild(card);
    try {
      await new Promise(r => setTimeout(r, 200));
      const canvas = await html2canvas(card, { scale: 2, useCORS: true, backgroundColor: '#ffffff', width: 680, logging: false });
      const a = document.createElement('a');
      const safeName = data.title.replace(/[\u{1F300}-\u{1FFFF}\s]/gu,'').replace(/[^\w\u4e00-\u9fff]/g,'') || '行程';
      a.download = `${safeName}_Day${di + 1}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
      await new Promise(r => setTimeout(r, 600));
    } catch(e) {
      console.error(e);
    } finally {
      document.body.removeChild(card);
    }
  }
  hideProgress();
  showToast(`✅ 全部 ${total} 天圖片已下載！`);
}

// ═══════════════════════════════════════════
// PDF EXPORT
// ═══════════════════════════════════════════
async function exportPDF() {
  document.getElementById('export-menu').classList.remove('open');
  showProgress('正在準備列印…', 30);
  await new Promise(r => setTimeout(r, 200));
  hideProgress();
  const printHTML = buildPrintHTML();
  const printWin = window.open('', '_blank', 'width=800,height=900');
  printWin.document.write(printHTML);
  printWin.document.close();
  printWin.onload = () => {
    setTimeout(() => { printWin.focus(); printWin.print(); }, 500);
  };
  showToast('📄 列印視窗已開啟，選擇「儲存為 PDF」');
}

function buildPrintHTML() {
  let daysHTML = '';
  data.days.forEach((day, di) => {
    let stopsHTML = '';
    day.stops.forEach((stop, si) => {
      const isLast = si === day.stops.length - 1;
      const noteTag = stop.note ? `<span class="tag tag-note">${stop.note}</span>` : '';
      let arriveTag = '';
      if (si > 0) {
        const prevStop = day.stops[si - 1];
        const drive = day.drives[si - 1] || 0;
        const arrMins = timeToMinutes(prevStop.depart) + drive;
        arriveTag = `<span class="tag tag-arrive">抵達 ${minutesToTime(arrMins)}</span>`;
      }
      const leaveTag = !isLast
        ? `<span class="tag tag-leave">離開 ${stop.depart}</span>`
        : `<span class="tag tag-arrive">抵達 ${stop.depart}</span>`;
      stopsHTML += `
        <div class="capture-stop-row ${isLast ? 'cap-last' : ''}">
          <div class="cap-left"><div class="cap-num">${si + 1}</div><div class="cap-line"></div></div>
          <div class="cap-content">
            <div class="cap-name">${stop.name}</div>
            <div class="cap-tags">${arriveTag}${leaveTag}${noteTag}</div>
          </div>
        </div>
        ${!isLast ? `<div class="cap-transit"><span class="cap-transit-text">🚗 約 ${day.drives[si]} 分鐘</span></div>` : ''}
      `;
    });
    daysHTML += `
      <div class="print-day-card">
        <div class="capture-header" style="border-radius:12px 12px 0 0">
          <div class="ch-day" style="margin:0;font-size:1rem">🗓 ${day.label} · ${day.theme}</div>
        </div>
        <div class="capture-body">${stopsHTML}</div>
      </div>
    `;
  });

  return `<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><title>${data.title}</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ocean:#1a6b8a;--sky:#5aa8c8;--sand:#f5ede0;--dark:#1c2b35;--mid:#4a6274;--light:#eaf4f8;--white:#fff;--border:#cce0ea;--green:#2d9e6b;--green-bg:#d8f0e4;--amber:#8a6200;--amber-bg:#fef3cd;--amber-light:#b07c20;--amber-light-bg:#fff8e6;--red:#9b3020;--red-bg:#fce4e0;}
*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Noto Sans TC',sans-serif;color:var(--dark);background:white;}
.print-header{background:linear-gradient(135deg,var(--ocean),var(--sky));color:white;padding:32px;text-align:center;margin-bottom:24px;}
.print-header h1{font-family:'Noto Serif TC',serif;font-size:1.8rem;letter-spacing:0.1em;}
.print-header p{font-size:0.9rem;opacity:0.85;margin-top:6px;}
.print-day-card{margin:0 16px 20px;border:1px solid var(--border);border-radius:12px;overflow:hidden;page-break-inside:avoid;}
.capture-header{background:linear-gradient(90deg,var(--ocean),var(--sky));color:white;padding:14px 20px;}
.ch-day{font-family:'Noto Serif TC',serif;font-size:0.95rem;font-weight:600;}
.capture-body{padding:12px 20px 16px;background:white;}
.capture-stop-row{display:flex;align-items:stretch;}
.cap-left{display:flex;flex-direction:column;align-items:center;width:30px;flex-shrink:0;margin-right:12px;}
.cap-num{width:24px;height:24px;border-radius:50%;background:var(--ocean);color:white;font-size:0.68rem;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:12px;}
.cap-line{width:2px;background:var(--border);flex:1;margin-top:4px;}.cap-last .cap-line{display:none;}
.cap-content{flex:1;padding:10px 0 8px;border-bottom:1px solid #f5f5f5;}.cap-last .cap-content{border-bottom:none;}
.cap-name{font-family:'Noto Serif TC',serif;font-size:0.9rem;font-weight:600;}
.cap-tags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
.tag{font-size:0.68rem;padding:2px 7px;border-radius:8px;}
.tag-arrive{background:var(--amber-bg);color:var(--amber);}.tag-leave{background:#fff8e6;color:#b07c20;}.tag-note{background:var(--red-bg);color:var(--red);}
.cap-transit{padding:3px 0 3px 42px;}
.cap-transit-text{font-size:0.7rem;color:var(--sky);background:var(--light);padding:2px 7px;border-radius:6px;}
@media print{body{print-color-adjust:exact;-webkit-print-color-adjust:exact;}.print-day-card{page-break-inside:avoid;margin:0 0 16px;}@page{margin:15mm;size:A4;}}
</style></head><body>
<div class="print-header"><h1>${data.title}</h1><p>${data.subtitle}</p></div>
${daysHTML}
<div style="text-align:center;font-size:0.72rem;color:var(--mid);padding:16px;">由互動行程產生</div>
</body></html>`;
}

// ═══════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════
function showProgress(msg, pct) {
  document.getElementById('progress-text').textContent = msg;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-overlay').classList.add('open');
}
function hideProgress() {
  document.getElementById('progress-overlay').classList.remove('open');
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════
// MODAL CLOSE ON OVERLAY CLICK
// ═══════════════════════════════════════════
['stop-modal','transit-modal','title-modal','subtitle-modal','day-modal','img-export-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});

renderAll();
