<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>澎湖三日遊 · 互動行程</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style id="main-style">







:root {
  --ocean: #1a6b8a;
  --sky: #5aa8c8;
  --sky-light: #a8d4e8;
  --sand: #f5ede0;
  --coral: #e07a5f;
  --dark: #1c2b35;
  --mid: #4a6274;
  --light: #eaf4f8;
  --white: #ffffff;
  --border: #cce0ea;
  --green: #2d9e6b;
  --green-bg: #d8f0e4;
  --amber: #8a6200;
  --amber-bg: #fef3cd;
  --amber-light: #b07c20;
  --amber-light-bg: #fff8e6;
  --red: #9b3020;
  --red-bg: #fce4e0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: #e8f4f8;
  min-height: 100vh;
  color: var(--dark);
  overflow-x: hidden;
}

/* ── NAV ── */
.nav {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(26,107,138,0.97);
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  padding: 0 12px;
  height: 56px;
  gap: 4px;
  box-shadow: 0 2px 16px rgba(26,107,138,0.25);
  flex-wrap: nowrap;
  overflow: visible;
}
.nav-title {
  font-family: 'Noto Serif TC', serif;
  color: white;
  font-size: 1rem;
  font-weight: 700;
  margin-right: auto;
  letter-spacing: 0.05em;
  white-space: nowrap;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.nav-title:hover { opacity: 0.85; }
.nav-title-edit-icon { font-size: 0.7rem; opacity: 0.7; }
.nav-btn {
  background: rgba(255,255,255,0.15);
  border: none;
  color: white;
  padding: 7px 12px;
  border-radius: 20px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: background 0.2s;
  letter-spacing: 0.03em;
  white-space: nowrap;
  flex-shrink: 0;
}
.nav-btn:hover { background: rgba(255,255,255,0.28); }
.nav-btn.active { background: white; color: var(--ocean); font-weight: 600; }

/* Export dropdown */
.export-wrap {
  position: relative;
  flex-shrink: 0;
  margin-left: 4px;
}
.nav-export {
  background: var(--coral);
  border: none;
  color: white;
  padding: 7px 12px;
  border-radius: 20px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: background 0.2s;
  font-weight: 600;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 4px;
}
.nav-export:hover { background: #c8664d; }
.export-menu {
  display: none;
  position: fixed;
  top: 56px;
  right: 12px;
  background: white;
  border-radius: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  padding: 6px;
  min-width: 180px;
  z-index: 9999;
}
.export-menu.open { display: block; }
.export-menu-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  border-radius: 10px;
  font-size: 0.82rem;
  color: var(--dark);
  cursor: pointer;
  transition: background 0.15s;
  font-family: 'Noto Sans TC', sans-serif;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.export-menu-item:hover { background: var(--light); color: var(--ocean); }
.export-menu-item .em-icon { font-size: 1rem; }
.export-menu-sep {
  height: 1px;
  background: var(--border);
  margin: 4px 8px;
}

/* ── PAGES ── */
.page { display: none; padding: 24px 16px 80px; max-width: 720px; margin: 0 auto; }
.page.active { display: block; }

/* ── MAP TOGGLE BUTTON ── */
.map-toggle-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--ocean);
  color: white;
  border: none;
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 0.8rem;
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  margin: 0 auto 10px;
  display: flex;
}
.map-toggle-btn:hover { background: #155a76; }
.map-collapsed #leaflet-map { display: none !important; }

/* ── MAP PAGE STICKY LAYOUT ── */
#page-map.active {
  display: flex;
  flex-direction: column;
  padding: 0;
  max-width: 100%;
  margin: 0;
  height: calc(100vh - 56px); /* subtract nav height */
  overflow: hidden;
}
.map-sticky-top {
  flex-shrink: 0;
  padding: 16px 16px 0;
  background: #e8f4f8;
  max-width: 720px;
  margin: 0 auto;
  width: 100%;
}
.map-scroll-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px 80px;
  max-width: 720px;
  margin: 0 auto;
  width: 100%;
  -webkit-overflow-scrolling: touch;
}

/* ── HEADER ── */
.header {
  text-align: center;
  margin-bottom: 28px;
}
.header h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--ocean);
  letter-spacing: 0.08em;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.header h1:hover { opacity: 0.8; }
.header .subtitle {
  font-size: 0.83rem;
  color: var(--mid);
  margin-top: 6px;
  letter-spacing: 0.04em;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.header .subtitle:hover { opacity: 0.75; }
.edit-hint {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #fff8e6;
  border: 1px solid #f0d890;
  color: #7a5c00;
  font-size: 0.75rem;
  padding: 5px 12px;
  border-radius: 20px;
  margin-top: 10px;
}

/* Add Day Button */
.add-day-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  max-width: 720px;
  margin: 0 auto 24px;
  padding: 14px;
  background: white;
  border: 2px dashed var(--border);
  border-radius: 20px;
  color: var(--mid);
  font-size: 0.85rem;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.2s;
}
.add-day-btn:hover { border-color: var(--sky); color: var(--ocean); background: var(--light); }

/* ── DAY CARD ── */
.day-card {
  background: var(--white);
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 24px;
  box-shadow: 0 4px 24px rgba(26,107,138,0.10);
}
.day-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 16px 12px;
  background: linear-gradient(90deg, var(--ocean) 0%, var(--sky) 100%);
  color: white;
}
.day-badge {
  font-family: 'Noto Serif TC', serif;
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
}
.day-badge:hover { opacity: 0.85; }
.day-theme-tag {
  font-size: 0.75rem;
  opacity: 0.9;
  background: rgba(255,255,255,0.18);
  padding: 3px 9px;
  border-radius: 20px;
  cursor: pointer;
}
.day-theme-tag:hover { background: rgba(255,255,255,0.3); }
.day-header-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
}
.day-map-btn {
  background: rgba(255,255,255,0.22);
  border: 1px solid rgba(255,255,255,0.4);
  color: white;
  padding: 4px 10px;
  border-radius: 14px;
  font-size: 0.72rem;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  transition: background 0.2s;
  white-space: nowrap;
}
.day-map-btn:hover { background: rgba(255,255,255,0.35); }
.day-edit-btn {
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.4);
  color: white;
  padding: 4px 10px;
  border-radius: 14px;
  font-size: 0.75rem;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  transition: background 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}
.day-edit-btn:hover { background: rgba(255,255,255,0.35); }
.day-delete-btn {
  background: rgba(255,100,80,0.3);
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  font-size: 0.75rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  flex-shrink: 0;
}
.day-delete-btn:hover { background: rgba(255,80,60,0.6); }

/* ── STOPS ── */
.stops { padding: 8px 0 10px; }
.stop-row {
  display: flex;
  align-items: stretch;
  padding: 0 16px;
  position: relative;
}
.stop-row:hover .stop-content { background: #f7fbfd; border-radius: 12px; }
.stop-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 30px;
  flex-shrink: 0;
  margin-right: 12px;
}
.stop-num {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--ocean);
  color: white;
  font-size: 0.72rem;
  font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 12px;
}
.stop-line {
  width: 2px;
  background: var(--border);
  flex: 1;
  margin-top: 4px;
}
.stop-row.last .stop-line { display: none; }

/* Transit */
.transit-row {
  display: flex;
  align-items: center;
  padding: 0 16px;
}
.transit-left {
  display: flex; flex-direction: column; align-items: center;
  width: 30px; flex-shrink: 0; margin-right: 12px;
}
.transit-line-top { width: 2px; height: 6px; background: var(--border); }
.transit-icon-wrap {
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  background: var(--light); border-radius: 50%;
  font-size: 0.65rem; color: var(--sky);
  border: 1.5px dashed var(--sky);
  flex-shrink: 0;
}
.transit-icon-wrap.walk {
  color: var(--green);
  border-color: var(--green);
  background: var(--green-bg);
}
.transit-mode-toggle {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.68rem;
  color: var(--mid);
  cursor: pointer;
  padding: 1px 6px;
  transition: all 0.15s;
  line-height: 1.5;
}
.transit-mode-toggle:hover { background: var(--light); border-color: var(--sky); color: var(--ocean); }
.transit-line-bot { width: 2px; flex: 1; min-height: 6px; background: var(--border); }
.transit-icon-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.transit-dur-below {
  font-size: 0.65rem;
  color: var(--ocean);
  background: var(--light);
  padding: 2px 6px;
  border-radius: 8px;
  white-space: nowrap;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background 0.2s;
}
.transit-dur-below:hover { background: #d0eaf5; border-color: var(--sky); }
.transit-icon-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.transit-dur-below {
  font-size: 0.65rem;
  color: var(--ocean);
  background: var(--light);
  padding: 2px 6px;
  border-radius: 8px;
  white-space: nowrap;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background 0.2s;
}
.transit-dur-below:hover { background: #d0eaf5; border-color: var(--sky); }
.transit-info {
  font-size: 0.74rem;
  color: var(--mid);
  padding: 4px 0;
  display: flex; align-items: center; gap: 8px;
}
.transit-dur {
  background: var(--light);
  color: var(--ocean);
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.71rem;
  cursor: pointer;
  transition: background 0.2s;
  border: 1px solid transparent;
}
.transit-dur:hover { background: #d0eaf5; border-color: var(--sky); }

/* Stop content */
.stop-content {
  flex: 1;
  padding: 10px 8px 8px 0;
  cursor: pointer;
  transition: background 0.15s;
}
.stop-name {
  font-family: 'Noto Serif TC', serif;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--dark);
  line-height: 1.3;
  display: flex;
  align-items: center;
  gap: 8px;
}
.stop-name .edit-icon {
  opacity: 0;
  font-size: 0.7rem;
  color: var(--sky);
  transition: opacity 0.15s;
}
.stop-content:hover .edit-icon { opacity: 1; }
.stop-meta {
  display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap;
}
.tag {
  font-size: 0.69rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 400;
  letter-spacing: 0.02em;
}
.tag-depart  { background: var(--amber-bg); color: var(--amber); }
.tag-arrive  { background: var(--amber-bg); color: var(--amber); }
.tag-leave   { background: var(--amber-light-bg); color: var(--amber-light); }
.tag-stay    { background: var(--green-bg); color: var(--green); }
.tag-note    { background: var(--red-bg);   color: var(--red);   }

/* ── 景點行內小按鈕（Maps / 導航）共用基底 ── */
.stop-action-btn {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  border-radius: 8px;
  font-size: 0.65rem;
  padding: 3px 8px;
  text-decoration: none;
  white-space: nowrap;
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 500;
  border: 1.5px solid transparent;
  cursor: pointer;
  opacity: 0;
  flex-shrink: 0;
  align-self: center;
  transition: opacity 0.15s, background 0.15s, border-color 0.15s, color 0.15s;
}
.stop-row:hover .stop-action-btn { opacity: 1; }

/* Maps 按鈕：淺藍 */
.stop-gmaps-btn {
  background: #e8f4fe;
  border-color: #90c4e8;
  color: #1a6b8a;
}
.stop-gmaps-btn:hover { background: #1a73e8; border-color: #1a73e8; color: white; }

/* 導航按鈕：中藍，與 Maps 同色系但稍深 */
.transit-nav-btn {
  background: #d4eaf6;
  border-color: #5aa8c8;
  color: #155a76;
}
.transit-nav-btn:hover { background: #1a6b8a; border-color: #1a6b8a; color: white; }

/* PDF Modal */
.pdf-option-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin: 16px 0 4px;
}
.pdf-option-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 12px;
  border: 2px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans TC', sans-serif;
}
.pdf-option-item:hover { border-color: var(--sky); background: var(--light); }
.pdf-option-item.selected { border-color: var(--ocean); background: #eaf4f8; }
.pdf-option-icon { font-size: 1.5rem; }
.pdf-option-label { font-size: 0.88rem; font-weight: 600; color: var(--dark); }
.pdf-option-desc { font-size: 0.73rem; color: var(--mid); margin-top: 2px; }

  display: flex;
  flex-direction: column;
  gap: 2px;
  align-self: center;
  margin-top: 0;
  opacity: 0;
  transition: opacity 0.15s;
}
.stop-row:hover .stop-move-wrap { opacity: 1; }
.stop-move-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--mid);
  width: 22px;
  height: 22px;
  border-radius: 6px;
  font-size: 0.65rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  padding: 0;
}
.stop-move-btn:hover { background: var(--light); border-color: var(--sky); color: var(--ocean); }
.stop-move-btn:disabled { opacity: 0.2; cursor: default; pointer-events: none; }

/* Delete button */
.stop-delete {
  opacity: 0;
  background: none;
  border: none;
  color: #ccc;
  cursor: pointer;
  padding: 0 4px;
  font-size: 1rem;
  align-self: flex-start;
  margin-top: 12px;
  transition: color 0.15s, opacity 0.15s;
}
.stop-row:hover .stop-delete { opacity: 1; }
.stop-delete:hover { color: var(--coral); }

/* Add stop button */
.add-stop-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 4px 16px 12px 58px;
  background: none;
  border: 1.5px dashed var(--border);
  color: var(--mid);
  padding: 6px 14px;
  border-radius: 12px;
  font-size: 0.78rem;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.2s;
}
.add-stop-btn:hover { border-color: var(--sky); color: var(--ocean); background: var(--light); }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white;
  border-radius: 20px;
  padding: 24px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  max-height: 90vh;
  overflow-y: auto;
}
.modal h3 {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.05rem;
  color: var(--ocean);
  margin-bottom: 16px;
}
.modal label {
  display: block;
  font-size: 0.78rem;
  color: var(--mid);
  margin-bottom: 4px;
  margin-top: 12px;
}
.modal input, .modal select, .modal textarea {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 8px 12px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.88rem;
  color: var(--dark);
  outline: none;
  transition: border-color 0.2s;
  background: white;
}
.modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--sky); }
.modal-row { display: flex; gap: 8px; }
.modal-row > * { flex: 1; }
.modal-actions {
  display: flex; gap: 10px; margin-top: 20px;
}
.btn-cancel {
  flex: 1; padding: 9px; border-radius: 12px;
  border: 1.5px solid var(--border);
  background: none; color: var(--mid);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.85rem; cursor: pointer;
}
.btn-save {
  flex: 2; padding: 9px; border-radius: 12px;
  border: none; background: var(--ocean); color: white;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.85rem; font-weight: 600; cursor: pointer;
  transition: background 0.2s;
}
.btn-save:hover { background: #155a76; }
.btn-danger {
  flex: 1; padding: 9px; border-radius: 12px;
  border: none; background: #fce4e0; color: var(--red);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.85rem; font-weight: 600; cursor: pointer;
}

/* Transit modal */
.transit-modal .modal { max-width: 300px; }

/* ── MAP PAGE ── */
.map-page-header {
  text-align: center;
  margin-bottom: 16px;
}
.map-page-header h2 {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.4rem;
  color: var(--ocean);
}
.map-page-header p {
  font-size: 0.8rem;
  color: var(--mid);
  margin-top: 4px;
}
.map-day-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  justify-content: center;
  flex-wrap: wrap;
}
.map-day-tab {
  padding: 8px 18px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: white;
  color: var(--mid);
  font-size: 0.82rem;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.2s;
}
.map-day-tab.active {
  background: var(--ocean);
  border-color: var(--ocean);
  color: white;
  font-weight: 600;
}

/* ── LEAFLET MAP ── */
#leaflet-map {
  width: 100%;
  height: clamp(220px, 38vh, 380px);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(26,107,138,0.15);
  margin-bottom: 12px;
  background: var(--light);
  z-index: 1;
}
/* Leaflet z-index fix (below modal) */
.leaflet-pane { z-index: 10 !important; }
.leaflet-top, .leaflet-bottom { z-index: 20 !important; }

/* Map loading overlay */
.map-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--mid);
  font-size: 0.85rem;
  gap: 10px;
}
.map-loading-spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--ocean);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Leaflet custom marker label */
.map-label-marker {
  background: var(--ocean);
  color: white;
  border-radius: 50%;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif;
  border: 2px solid white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.map-label-marker.geocode-fail {
  background: #999;
}

/* 路線段落時間標籤 */
.map-transit-time-label {
  background: white;
  color: var(--ocean);
  border: 2px solid var(--sky);
  border-radius: 12px;
  padding: 2px 8px;
  font-size: 0.68rem;
  font-weight: 600;
  font-family: 'Noto Sans TC', sans-serif;
  white-space: nowrap;
  box-shadow: 0 2px 6px rgba(26,107,138,0.18);
  pointer-events: none;
  transform: translate(-50%, -50%);
  display: inline-block;
}
.map-transit-time-label.walk {
  color: var(--green);
  border-color: var(--green);
}

/* ── MAP STOP LIST (Inline Edit) ── */
.map-stop-list {
  background: white;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 2px 12px rgba(26,107,138,0.08);
  margin-bottom: 14px;
}
.map-stop-list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.map-stop-list-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--ocean);
}
.map-add-stop-btn {
  background: var(--light);
  border: 1.5px dashed var(--border);
  color: var(--ocean);
  font-size: 0.75rem;
  padding: 4px 12px;
  border-radius: 12px;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.2s;
}
.map-add-stop-btn:hover { background: var(--sky-light); border-color: var(--sky); }

/* Map stop row */
.map-stop-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 6px;
  border-radius: 10px;
  transition: background 0.15s;
  position: relative;
}
.map-stop-row:hover { background: #f7fbfd; }
.map-stop-row:hover .map-stop-actions { opacity: 1; }

.map-stop-letter {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--ocean);
  color: white;
  font-size: 0.75rem;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-family: 'Noto Sans TC', sans-serif;
}
.map-stop-letter.geocode-fail { background: #aaa; }

/* Inline editable fields */
.map-stop-name-wrap { flex: 1; min-width: 0; }
.map-inline-name {
  font-family: 'Noto Serif TC', serif;
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--dark);
  cursor: text;
  padding: 2px 6px;
  border-radius: 6px;
  border: 1.5px solid transparent;
  width: 100%;
  background: transparent;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: border-color 0.2s, background 0.2s;
  outline: none;
  font-family: 'Noto Serif TC', serif;
}
.map-inline-name:hover { border-color: var(--border); background: white; }
.map-inline-name:focus { border-color: var(--sky); background: white; }

.map-stop-note {
  font-size: 0.7rem;
  color: var(--mid);
  padding: 0 6px;
  margin-top: 1px;
}

/* Time fields */
.map-stop-times {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
  flex-shrink: 0;
}
.map-inline-time {
  font-size: 0.75rem;
  color: var(--amber);
  background: var(--amber-bg);
  border: 1.5px solid transparent;
  border-radius: 8px;
  padding: 2px 7px;
  cursor: text;
  outline: none;
  font-family: 'Noto Sans TC', sans-serif;
  width: 80px;
  text-align: center;
  transition: border-color 0.2s;
}
.map-inline-time:hover { border-color: var(--amber); }
.map-inline-time:focus { border-color: var(--ocean); background: white; color: var(--dark); }

.map-stop-arrive {
  font-size: 0.68rem;
  color: var(--mid);
  text-align: right;
  padding-right: 2px;
}

/* Action buttons */
.map-stop-actions {
  display: flex;
  flex-direction: column;
  gap: 2px;
  opacity: 0;
  transition: opacity 0.15s;
  flex-shrink: 0;
}
.map-action-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--mid);
  width: 20px; height: 20px;
  border-radius: 5px;
  font-size: 0.6rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  padding: 0;
}
.map-action-btn:hover { background: var(--light); border-color: var(--sky); color: var(--ocean); }
.map-action-btn:disabled { opacity: 0.2; cursor: default; pointer-events: none; }
.map-action-btn.del:hover { background: var(--red-bg); border-color: var(--red); color: var(--red); }
.map-action-google {
  text-decoration: none;
  font-size: 0.7rem;
  background: #e8f4fe;
  border-color: #90c4e8;
  color: #1a6b8a;
}
.map-action-google:hover { background: #1a73e8 !important; border-color: #1a73e8 !important; color: white !important; }

/* Transit row in map list */
.map-transit-row {
  display: flex;
  align-items: center;
  padding: 2px 6px 2px 36px;
  gap: 8px;
}
.map-inline-drive {
  font-size: 0.7rem;
  color: var(--ocean);
  background: var(--light);
  border: 1.5px solid transparent;
  border-radius: 8px;
  padding: 2px 8px;
  cursor: text;
  outline: none;
  font-family: 'Noto Sans TC', sans-serif;
  width: 90px;
  transition: border-color 0.2s;
}
.map-inline-drive:hover { border-color: var(--sky); }
.map-inline-drive:focus { border-color: var(--ocean); background: white; color: var(--dark); }
.map-transit-label {
  font-size: 0.68rem;
  color: var(--mid);
}
/* Google Maps query button */
.map-gmaps-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #fff8e6;
  border: 1.5px solid #f0c040;
  border-radius: 8px;
  font-size: 0.68rem;
  color: #7a5200;
  cursor: pointer;
  padding: 2px 8px;
  text-decoration: none;
  white-space: nowrap;
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 500;
  transition: all 0.15s;
}
.map-gmaps-btn:hover { background: #fef0c0; border-color: #d4a800; color: #5a3c00; }

/* Error/loading badge */
.map-geocode-badge {
  font-size: 0.65rem;
  padding: 1px 6px;
  border-radius: 6px;
  flex-shrink: 0;
}
.map-geocode-badge.loading { background: var(--light); color: var(--sky); }
.map-geocode-badge.fail { background: var(--red-bg); color: var(--red); cursor: help; }
.map-geocode-badge.manual { background: var(--green-bg); color: var(--green); }

/* 座標輸入列 */
.map-coords-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
}
.map-inline-coords {
  flex: 1;
  font-size: 0.68rem;
  color: var(--dark);
  background: #f0faf4;
  border: 1.5px dashed #90cca8;
  border-radius: 7px;
  padding: 3px 8px;
  outline: none;
  font-family: 'Noto Sans TC', sans-serif;
  transition: border-color 0.2s, background 0.2s;
  min-width: 0;
}
.map-inline-coords::placeholder { color: #90b89a; font-size: 0.65rem; }
.map-inline-coords:hover { border-color: var(--green); }
.map-inline-coords:focus { border-color: var(--green); background: white; border-style: solid; }

/* ── MAP NAV BUTTON ── */
.map-nav-bottom {
  background: white;
  border-radius: 14px;
  padding: 14px 16px;
  box-shadow: 0 2px 12px rgba(26,107,138,0.08);
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.map-nav-hero-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: var(--ocean);
  color: white;
  text-decoration: none;
  padding: 11px 16px;
  border-radius: 12px;
  font-size: 0.85rem;
  font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif;
  transition: background 0.2s, transform 0.15s;
  letter-spacing: 0.03em;
  min-width: 160px;
  text-align: center;
}
.map-nav-hero-btn:hover { background: #155a76; transform: translateY(-1px); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--dark);
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 0.82rem;
  z-index: 3000;
  transition: transform 0.3s ease;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── EXPORT IMAGE MODAL ── */
.img-export-modal .modal { max-width: 360px; }
.img-day-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 4px;
}
.img-day-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans TC', sans-serif;
  background: none;
  color: var(--dark);
}
.img-day-item:hover { border-color: var(--sky); background: var(--light); color: var(--ocean); }
.img-day-item .iday-label { font-weight: 500; }
.img-day-item .iday-stops { font-size: 0.72rem; color: var(--mid); margin-top: 2px; }
.img-day-item-inner { text-align: left; }

/* ── PRINT / IMAGE CAPTURE STYLES ── */
.capture-card {
  width: 680px;
  font-family: 'Noto Sans TC', sans-serif;
  background: white;
  border-radius: 0;
  padding: 0;
  position: absolute;
  left: -9999px;
  top: 0;
}
.capture-header {
  background: linear-gradient(135deg, var(--ocean) 0%, var(--sky) 100%);
  color: white;
  padding: 28px 32px 22px;
  text-align: center;
}
.capture-header .ch-emoji { font-size: 2rem; margin-bottom: 8px; display: block; }
.capture-header .ch-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}
.capture-header .ch-sub {
  font-size: 0.85rem;
  opacity: 0.85;
  letter-spacing: 0.04em;
}
.capture-header .ch-day {
  display: inline-block;
  background: rgba(255,255,255,0.22);
  padding: 5px 18px;
  border-radius: 20px;
  margin-top: 12px;
  font-size: 0.92rem;
  font-weight: 600;
  letter-spacing: 0.05em;
}
.capture-body {
  padding: 16px 24px 20px;
  background: white;
}
.capture-stop-row {
  display: flex;
  align-items: stretch;
  margin-bottom: 0;
}
.cap-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 32px;
  flex-shrink: 0;
  margin-right: 14px;
}
.cap-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--ocean);
  color: white;
  font-size: 0.72rem;
  font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 14px;
}
.cap-line {
  width: 2px;
  background: var(--border);
  flex: 1;
  margin-top: 4px;
}
.cap-last .cap-line { display: none; }
.cap-content {
  flex: 1;
  padding: 12px 0 8px;
  border-bottom: 1px solid #f5f5f5;
}
.cap-last .cap-content { border-bottom: none; }
.cap-name {
  font-family: 'Noto Serif TC', serif;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--dark);
  line-height: 1.3;
}
.cap-tags {
  display: flex;
  gap: 6px;
  margin-top: 5px;
  flex-wrap: wrap;
}
.cap-transit {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 3px 0 3px 46px;
}
.cap-transit-text {
  font-size: 0.72rem;
  color: var(--sky);
  background: var(--light);
  padding: 2px 8px;
  border-radius: 8px;
}
.capture-footer {
  background: var(--light);
  padding: 12px 24px;
  text-align: center;
  font-size: 0.72rem;
  color: var(--mid);
  border-top: 1px solid var(--border);
}

/* Progress overlay */
.progress-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(26,107,138,0.85);
  z-index: 4000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.progress-overlay.open { display: flex; }
.progress-text {
  color: white;
  font-size: 1rem;
  font-family: 'Noto Serif TC', serif;
  letter-spacing: 0.05em;
}
.progress-bar-wrap {
  width: 240px;
  height: 6px;
  background: rgba(255,255,255,0.3);
  border-radius: 10px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: white;
  border-radius: 10px;
  transition: width 0.4s ease;
  width: 0%;
}

/* ══════════════════════════════════════════
   MOBILE RESPONSIVE STYLES
   ══════════════════════════════════════════ */

/* ── 手機觸控：常態顯示 hover-only 元素 ── */
@media (hover: none) and (pointer: coarse) {
  .stop-name .edit-icon { opacity: 0.6; }
  .stop-action-btn { opacity: 1; }
  .stop-delete { opacity: 0.55; }
  .stop-move-wrap { opacity: 1; }
  .map-stop-actions { opacity: 1; }
}

/* ── 小螢幕 (≤ 480px) ── */
@media (max-width: 480px) {

  /* NAV */
  .nav {
    padding: 0 10px;
    height: auto;
    min-height: 56px;
    flex-wrap: wrap;
    gap: 3px;
    padding: 8px 10px;
  }
  .nav-title {
    font-size: 0.88rem;
    width: 100%;
    margin-right: 0;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    margin-bottom: 2px;
  }
  .nav-title-edit-icon { display: none; }
  .nav-btn {
    padding: 6px 10px;
    font-size: 0.75rem;
    flex: 1;
    text-align: center;
  }
  .export-wrap {
    flex: 1;
    margin-left: 0;
  }
  .nav-export {
    width: 100%;
    justify-content: center;
    font-size: 0.75rem;
    padding: 6px 10px;
  }
  .export-menu {
    right: 8px;
    left: 8px;
    top: auto;
    /* anchor below nav dynamically via JS — fallback: */
  }

  /* PAGE */
  .page { padding: 16px 12px 80px; }

  /* HEADER */
  .header { margin-bottom: 18px; }
  .header h1 { font-size: 1.4rem; }
  .header .subtitle { font-size: 0.78rem; }
  .edit-hint { font-size: 0.68rem; padding: 4px 10px; }

  /* DAY CARD */
  .day-card { margin-bottom: 16px; border-radius: 16px; }
  .day-header { padding: 12px 12px 10px; gap: 6px; }
  .day-badge { font-size: 0.88rem; }
  .day-theme-tag { font-size: 0.7rem; padding: 2px 7px; }
  .day-map-btn { padding: 3px 8px; font-size: 0.68rem; }
  .day-edit-btn { padding: 3px 8px; font-size: 0.7rem; }
  .day-delete-btn { width: 24px; height: 24px; font-size: 0.7rem; }

  /* STOPS */
  .stop-row { padding: 0 10px; }
  .stop-left { width: 26px; margin-right: 10px; }
  .stop-num { width: 24px; height: 24px; font-size: 0.68rem; }
  .stop-name { font-size: 0.88rem; }
  .stop-content { padding: 8px 6px 6px 0; }
  .tag { font-size: 0.65rem; padding: 2px 6px; }

  /* 手機上 stop 操作按鈕改為較大觸控區 */
  .stop-delete {
    opacity: 0.45;
    font-size: 1.1rem;
    padding: 2px 6px;
  }
  .stop-move-btn { width: 26px; height: 26px; font-size: 0.72rem; }

  /* Add stop btn */
  .add-stop-btn { margin-left: 46px; font-size: 0.75rem; padding: 5px 12px; }

  /* Transit */
  .transit-row { padding: 0 10px; }
  .transit-left { width: 26px; margin-right: 10px; }
  .transit-dur { font-size: 0.67rem; }

  /* 行內小按鈕手機尺寸 */
  .stop-action-btn { font-size: 0.63rem; padding: 3px 7px; opacity: 1; }

  /* Add Day */
  .add-day-btn { font-size: 0.8rem; padding: 12px; border-radius: 16px; }

  /* MAP PAGE */
  .map-sticky-top { padding: 12px 12px 0; }
  .map-page-header h2 { font-size: 1.15rem; }
  .map-page-header p { font-size: 0.73rem; }
  .map-day-tabs { gap: 5px; }
  .map-day-tab { padding: 6px 12px; font-size: 0.76rem; }
  #leaflet-map { height: clamp(180px, 30vh, 280px); }
  .map-scroll-body { padding: 10px 12px 80px; }

  /* MAP STOP LIST */
  .map-stop-list { padding: 12px; }
  .map-inline-name { font-size: 0.82rem; }
  .map-inline-time { width: 70px; font-size: 0.7rem; }
  .map-stop-times { gap: 1px; }
  .map-stop-row { padding: 6px 4px; gap: 6px; }

  /* Nav card */
  .day-nav-card { padding: 12px 12px; }
  .nav-card-btn { font-size: 0.8rem; padding: 10px 12px; }
  .nav-card-chip { font-size: 0.65rem; }

  /* MODAL */
  .modal { padding: 18px 16px; border-radius: 16px; }
  .modal h3 { font-size: 0.95rem; }
  .modal input, .modal select, .modal textarea { font-size: 0.83rem; padding: 7px 10px; }
  .modal-overlay { padding: 12px; }
  .btn-save, .btn-cancel, .btn-danger { font-size: 0.8rem; padding: 8px; }

  /* TOAST */
  .toast { font-size: 0.78rem; padding: 9px 16px; bottom: 16px; max-width: calc(100vw - 32px); white-space: normal; text-align: center; }

  /* MAP NAV BOTTOM */
  .map-nav-bottom { gap: 8px; padding: 12px; }
  .map-nav-hero-btn { font-size: 0.8rem; padding: 10px 12px; min-width: 0; }
}

/* ── 中等手機 (481–640px) ── */
@media (min-width: 481px) and (max-width: 640px) {
  .nav-title { font-size: 0.92rem; }
  .nav-btn { padding: 6px 11px; font-size: 0.77rem; }
  .header h1 { font-size: 1.55rem; }
  .day-badge { font-size: 0.9rem; }
  .stop-name { font-size: 0.9rem; }
  .map-day-tab { padding: 7px 14px; font-size: 0.78rem; }
  .stop-delete { opacity: 0.5; }
  .stop-action-btn { opacity: 1; }
  .map-stop-actions { opacity: 1; }
}

/* ── 匯出選單在手機上的修正 ── */
@media (max-width: 600px) {
  .export-menu {
    position: fixed;
    left: 8px !important;
    right: 8px !important;
    top: auto;
    min-width: unset;
  }
  .export-menu-item { font-size: 0.8rem; padding: 10px 12px; }
}

/* ── 確保地圖 tabs 在手機可橫向捲動 ── */
@media (max-width: 480px) {
  .map-day-tabs {
    flex-wrap: nowrap;
    overflow-x: auto;
    justify-content: flex-start;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .map-day-tabs::-webkit-scrollbar { display: none; }
  .map-day-tab { flex-shrink: 0; }
}

/* ══════════════════════════════════════════ */

/* ── NAV CARD — Day 卡片底部導航按鈕 ── */
.day-nav-card {
  border-top: 1px solid var(--border);
  background: linear-gradient(135deg, #f0f8fc 0%, #e8f4f8 100%);
  padding: 14px 16px;
  border-radius: 0 0 20px 20px;
}
.nav-card-inner {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.nav-card-route {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px;
  padding: 2px 0;
}
.nav-card-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.7rem;
  color: var(--dark);

{"label":"Day 3 · 4/28（二）","theme":"古蹟探訪 · 返程","stops":[{"name":"🏨 鎖港郵局會館","depart":"09:15","stay":0,"note":"早餐附近吃或買回來吃,退房行李上車","coords":{"lat":23.5253088606287,"lng":119.59690207116421},"_departUserSet":true},{"name":"澎湖縣南海立體停車場","depart":"09:45","stay":10,"note":"","coords":{"lat":23.567468297852084,"lng":119.5706976124363},"arrive":"09:35","_departUserSet":true},{"name":"🏛 舊郵便局+街上買伴手禮","depart":"12:55","stay":125,"note":"","coords":{"lat":23.56374738106533,"lng":119.56396447301476},"arrive":"10:00","_departUserSet":true},{"name":"澎湖縣南海立體停車場","depart":"13:20","stay":10,"note":"","arrive":"13:10","_departUserSet":true,"coords":{"lat":23.567468297852084,"lng":119.5706976124363}},{"name":"澎湖六合租車-石泉店","depart":"14:00","stay":30,"note":"一台車去還車坐接駁車,另一車直接去機場","arrive":"13:30","_departUserSet":true,"coords":{"lat":23.561463705191535,"lng":119.5944892153432}},{"name":"✈️ 澎湖機場","depart":"14:10","stay":0,"note":"班機 15:30","arrive":"14:10"}],"drives":[20,15,15,10,10,15],"modes":["drive","walk","walk","drive","drive","drive"]}]};

const STORAGE_KEY = 'itinerary_data';

// ═══════════════════════════════════════════
// STORAGE ABSTRACTION（相容 file:// 環境）
// ═══════════════════════════════════════════
let _memStore = {}; // file:// 環境的記憶體備用
function storageGet(key) {
  try { return localStorage.getItem(key); } catch(e) { return _memStore[key] || null; }
}
function storageSet(key, val) {
  try { localStorage.setItem(key, val); } catch(e) { _memStore[key] = val; }
}
function storageRemove(key) {
  try { localStorage.removeItem(key); } catch(e) { delete _memStore[key]; }
}

// ═══════════════════════════════════════════
// LOAD / SAVE
// ═══════════════════════════════════════════
function loadData() {
  try {
    const saved = storageGet(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch (e) {
    console.warn('無法讀取儲存，使用預設資料', e);
  }
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveData() {
  try {
    storageSet(STORAGE_KEY, JSON.stringify(data));
    showToast('💾 已儲存至本機！');
    document.getElementById('export-menu').classList.remove('open');
  } catch (e) {
    showToast('⚠️ 儲存失敗');
    console.error('儲存失敗', e);
  }
}

let data = loadData();

// ═══════════════════════════════════════════
// UNDO STACK（最近 20 次操作）
// ═══════════════════════════════════════════
const undoStack = [];
function pushUndo() {
  undoStack.push(JSON.stringify(data));
  if (undoStack.length > 20) undoStack.shift();
}
function undo() {
  if (!undoStack.length) { showToast('⚠️ 已無可復原的操作'); return; }
  data = JSON.parse(undoStack.pop());
  renderAll();
  autosave();
  showToast('↩ 已復原上一步');
}

// ═══════════════════════════════════════════
// AUTOSAVE（每次修改後 300ms debounce）
// ═══════════════════════════════════════════
let _autosaveTimer = null;
function autosave() {
  clearTimeout(_autosaveTimer);
  _autosaveTimer = setTimeout(() => {
    try { storageSet(STORAGE_KEY, JSON.stringify(data)); } catch(e) { console.warn('autosave 失敗', e); }
  }, 300);
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function timeToMinutes(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function minutesToTime(mins) {
  const h = Math.floor(mins / 60) % 24;
  const m = mins % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function stayLabel(mins) {
  if (!mins) return null;
  if (mins < 60) return `停留 ${mins} 分鐘`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m ? `停留 ${h} 小時 ${m} 分` : `停留 ${h} 小時`;
}

// 重新計算從 fromIdx 之後所有站的「抵達時間」（arrive）
// depart 保持使用者設定值不動；若 stop 無 depart 才由 arrive+stay 推算初始值
function recalcTimes(dayIdx, fromIdx) {
  const day = data.days[dayIdx];
  const start = (fromIdx !== undefined) ? fromIdx : 0;
  for (let i = start; i < day.stops.length - 1; i++) {
    const leaveMins   = timeToMinutes(day.stops[i].depart);
    const driveMins   = day.drives[i] || 0;
    const nextArrMins = leaveMins + driveMins;
    // 儲存「抵達時間」作為 derived 欄位
    day.stops[i + 1].arrive = minutesToTime(nextArrMins);
    // 僅在使用者尚未設定 depart 時，以 arrive+stay 推算初始離開時間
    if (!day.stops[i + 1]._departUserSet) {
      const nextStay = day.stops[i + 1].stay || 0;
      day.stops[i + 1].depart = minutesToTime(nextArrMins + nextStay);
    }
  }
}

// ═══════════════════════════════════════════
// NAV URL helpers
// ═══════════════════════════════════════════
function _stopToPlace(stopName) {
  const clean = stopName.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFE0F\u{1F900}-\u{1F9FF}]/gu, '').trim();
  if (/澎湖|馬公|西嶼|湖西|白沙|望安|七美/.test(clean)) return clean;
  return clean + ' 澎湖';
}
function _buildStopGMapsURL(stop) {
  if (stop.coords) {
    return `https://www.google.com/maps/search/?api=1&query=${stop.coords.lat},${stop.coords.lng}`;
  }
  return `https://www.google.com/maps/search/${encodeURIComponent(_stopToPlace(stop.name))}`;
}
function _buildNavURL(di, forceMode) {
  const places = data.days[di].stops.map(s => _stopToPlace(s.name));
  // Determine predominant mode
  const modes = data.days[di].modes || [];
  const walkCount = modes.filter(m => m === 'walk').length;
  const driveCount = (data.days[di].drives.length) - walkCount;
  const travelmode = forceMode || (walkCount > driveCount ? 'walking' : 'driving');
  return `https://www.google.com/maps/dir/${places.map(p => encodeURIComponent(p)).join('/')}?travelmode=${travelmode}`;
}

// Build Google Maps URL for A→B segment query (with travel mode)
function _buildSegGMapsURL(di, si) {
  const day = data.days[di];
  const stopA = day.stops[si];
  const stopB = day.stops[si + 1];
  const mode = (day.modes && day.modes[si]) || 'drive';
  const travelmode = mode === 'walk' ? 'walking' : 'driving';

  // Prefer coords for accuracy; fall back to name
  function placeParam(stop) {
    if (stop.coords) return `${stop.coords.lat},${stop.coords.lng}`;
    return encodeURIComponent(_stopToPlace(stop.name));
  }

  const from = placeParam(stopA);
  const to   = placeParam(stopB);
  return `https://www.google.com/maps/dir/${from}/${to}/?travelmode=${travelmode}`;
}

function renderNavCard(di) {
  const day    = data.days[di];
  const stops  = day.stops;
  const navURL = _buildNavURL(di);
  const cleanName = name => name.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFE0F\u{1F900}-\u{1F9FF}]/gu, '').trim();
  const routeChips = stops.map((s, i) => {
    const n = cleanName(s.name);
    const label = n.length > 8 ? n.slice(0, 8) + '…' : n;
    return `<span class="nav-card-chip"><span class="nav-card-chip-num">${i + 1}</span>${label}</span>${i < stops.length - 1 ? '<span class="nav-card-arrow">›</span>' : ''}`;
  }).join('');

  document.getElementById(`nav-card-${di}`).innerHTML = `
    <div class="nav-card-inner">
      <div class="nav-card-route">${routeChips}</div>
      <a class="nav-card-btn" href="${navURL}" target="_blank">
        <span class="nav-card-btn-icon">🗺</span>
        <span>開啟 Google Maps 導航</span>
        <span class="nav-card-btn-arrow">↗</span>
      </a>
    </div>
  `;
}

// ═══════════════════════════════════════════
// GEOCODING (Nominatim — 免費，無需 API Key)
// ═══════════════════════════════════════════
const geocodeCache = {}; // { "景點名稱": {lat, lng} | null }
const geocodeQueue = []; // [{ key, resolve }]
let geocodeBusy = false;

// Nominatim 規定每秒最多 1 次請求
async function _drainQueue() {
  if (geocodeBusy || geocodeQueue.length === 0) return;
  geocodeBusy = true;
  const { key, resolve } = geocodeQueue.shift();
  try {
    const q = encodeURIComponent(key);
    const url = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&accept-language=zh-TW`;
    const res = await fetch(url, {
      headers: { 'User-Agent': 'TravelItineraryApp/1.0' }
    });
    const json = await res.json();
    if (json && json.length > 0) {
      geocodeCache[key] = { lat: parseFloat(json[0].lat), lng: parseFloat(json[0].lon) };
    } else {
      geocodeCache[key] = null;
    }
    resolve(geocodeCache[key]);
  } catch (e) {
    geocodeCache[key] = null;
    resolve(null);
  }
  geocodeBusy = false;
  setTimeout(_drainQueue, 1100); // 1.1 秒間隔，遵守 Nominatim 規定
}

function geocode(stopName, stopObj) {
  // 如果景點已有手動座標，直接回傳
  if (stopObj && stopObj.coords) {
    return Promise.resolve(stopObj.coords);
  }
  // 清除 emoji 後加上「澎湖」提升精準度
  const clean = stopName.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFE0F\u{1F900}-\u{1F9FF}]/gu, '').trim();
  const key = /澎湖|馬公|西嶼|湖西|白沙|望安|七美/.test(clean) ? clean : clean + ' 澎湖 台灣';

  if (key in geocodeCache) return Promise.resolve(geocodeCache[key]);

  return new Promise(resolve => {
    geocodeQueue.push({ key, resolve });
    _drainQueue();
  });
}

// ═══════════════════════════════════════════
// MAP PAGE
// ═══════════════════════════════════════════
let currentMapDay = 0;
let leafletMap = null;
let mapMarkers = [];
let mapPolyline = null;
let mapSegmentPolylines = []; // 各段路線（分段，方便各段著色）
let mapTransitLabels = [];    // 路線中點時間標籤 marker

// 字母標籤 A B C D...
function stopLetter(i) {
  return String.fromCharCode(65 + i); // A=65
}

function renderMap() {
  if (currentMapDay >= data.days.length) currentMapDay = 0;

  // Tab 列
  const tabsEl = document.getElementById('map-tabs');
  tabsEl.innerHTML = '';

    btn.textContent = day.label;
    btn.onclick = () => { currentMapDay = di; renderMap(); };
    tabsEl.appendChild(btn);
  });

  // 初始化 Leaflet（只建立一次）
  if (!leafletMap) {
    leafletMap = L.map('leaflet-map', {
      center: [23.565, 119.579], // 澎湖
      zoom: 12,
      zoomControl: true,
    });
    // 使用台灣地圖（國土測繪圖磚，正體中文）
    // fallback 到 OpenStreetMap
    L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}', {
      attribution: '© <a href="https://maps.nlsc.gov.tw/">國土測繪中心</a> © <a href="https://www.openstreetmap.org/">OpenStreetMap</a>',
      maxZoom: 18,
      tileSize: 256,
      errorTileUrl: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    }).addTo(leafletMap);
  }

  renderMapStopList();
  refreshMapMarkers();
}

// 更新地圖上的標記與路線
async function refreshMapMarkers() {
  mapMarkers.forEach(m => leafletMap.removeLayer(m));
  mapMarkers = [];
  if (mapPolyline) { leafletMap.removeLayer(mapPolyline); mapPolyline = null; }
  mapSegmentPolylines.forEach(p => leafletMap.removeLayer(p));
  mapSegmentPolylines = [];
  mapTransitLabels.forEach(l => leafletMap.removeLayer(l));
  mapTransitLabels = [];

  const day   = data.days[currentMapDay];
  const stops = day.stops;
  const coords = [];

  const promises = stops.map(s => geocode(s.name, s));

  for (let i = 0; i < stops.length; i++) {
    promises[i].then(coord => {
      if (!coord) {
        const badge = document.querySelector(`[data-map-badge="${i}"]`);
        if (badge) { badge.textContent = '找不到位置，請輸入座標'; badge.className = 'map-geocode-badge fail'; }
        const letter = document.querySelector(`[data-map-letter="${i}"]`);
        if (letter) letter.classList.add('geocode-fail');
        // U-03：自動展開並聚焦座標輸入欄，引導使用者手動輸入
        const row = document.querySelector(`.map-stop-row[data-si="${i}"]`);
        if (row) {
          const coordInput = row.querySelector('.map-inline-coords');
          if (coordInput) {
            coordInput.style.borderColor = 'var(--amber)';
            coordInput.title = '⚠️ 自動定位失敗，請從 Google Maps 右鍵複製座標貼上';
            // 僅在此行是第一個失敗的景點時才聚焦，避免搶焦
            if (!document.querySelector('.map-inline-coords[style*="amber"]')) {
              setTimeout(() => coordInput.focus(), 300);
            }
          }
        }
        return;
      }
      const badge = document.querySelector(`[data-map-badge="${i}"]`);
      if (badge) badge.remove();

      coords[i] = [coord.lat, coord.lng];

      // 找出與此座標相同的其他景點（距離 < ~50m）
      const sameIdxs = [i];
      for (let j = 0; j < stops.length; j++) {
        if (j === i || !coords[j]) continue;
        if (Math.abs(coords[j][0] - coord.lat) < 0.0005 &&
            Math.abs(coords[j][1] - coord.lng) < 0.0005) {
          sameIdxs.push(j);
        }
      }

      // 移除舊的同位置標記，重建合併標記
      sameIdxs.forEach(idx => {
        const old = mapMarkers.find(m => m._stopIdx === idx);
        if (old) { leafletMap.removeLayer(old); mapMarkers = mapMarkers.filter(m => m !== old); }
      });

      // 標籤：同位置用 "A/E" 格式
      const letters = [...new Set(sameIdxs)].sort((a,b)=>a-b).map(idx => stopLetter(idx));
      const isMulti = letters.length > 1;
      const labelHTML = `<div class="map-label-marker${isMulti ? ' multi' : ''}">${letters.join('/')}</div>`;
      const popupLines = [...new Set(sameIdxs)].sort((a,b)=>a-b)
        .map(idx => `<b>${stopLetter(idx)}. ${stops[idx].name}</b><br><span style="font-size:0.8em">${stops[idx].depart}</span>`)
        .join('<hr style="margin:4px 0">');

      const icon = L.divIcon({
        className: '',
        html: labelHTML,
        iconSize: [28, 28],
        iconAnchor: [14, 14],
        popupAnchor: [0, -14],
      });
      const marker = L.marker([coord.lat, coord.lng], { icon })
        .bindPopup(popupLines)
        .addTo(leafletMap);
      marker._stopIdx = i;
      mapMarkers.push(marker);

      drawPolylineIfReady(coords, stops.length);
    });
  }
}

function drawPolylineIfReady(coords, total) {
  const filled = coords.filter(Boolean);
  // 只要有 2 個以上就畫
  if (filled.length >= 2) {
    // 清除舊的分段路線和標籤
    mapSegmentPolylines.forEach(p => leafletMap.removeLayer(p));
    mapSegmentPolylines = [];
    mapTransitLabels.forEach(l => leafletMap.removeLayer(l));
    mapTransitLabels = [];
    if (mapPolyline) { leafletMap.removeLayer(mapPolyline); mapPolyline = null; }

    const day = data.days[currentMapDay];
    const allLatLngs = [];

    // 找出所有有座標的景點索引（保留原始順序）
    const validIdxs = [];
    for (let j = 0; j < total; j++) {
      if (coords[j]) validIdxs.push(j);
    }

    // 逐段畫線 + 中點時間標籤
    for (let k = 0; k < validIdxs.length - 1; k++) {
      const idxA = validIdxs[k];
      const idxB = validIdxs[k + 1];
      const cA = coords[idxA];
      const cB = coords[idxB];
      if (!cA || !cB) continue;

      allLatLngs.push(cA);

      // 畫此段路線
      const seg = L.polyline([cA, cB], {
        color: '#1a6b8a',
        weight: 3,
        opacity: 0.75,
        dashArray: '8, 6',
      }).addTo(leafletMap);
      mapSegmentPolylines.push(seg);

      // 找 idxA → idxB 之間的車程（可能跨過未定位景點，累加 drives）
      let totalMins = 0;
      let hasMode = false;
      let walkCount = 0;
      for (let m = idxA; m < idxB; m++) {
        totalMins += (day.drives[m] || 0);
        const mode = (day.modes && day.modes[m]) || 'drive';
        if (mode === 'walk') walkCount++;
        hasMode = true;
      }
      const segCount = idxB - idxA;
      const isWalk = segCount > 0 && walkCount === segCount; // 全段都是步行才算步行

      if (totalMins > 0) {
        // 計算中點
        const midLat = (cA[0] + cB[0]) / 2;
        const midLng = (cA[1] + cB[1]) / 2;
        const modeIcon = isWalk ? '🚶' : '🚗';
        const labelText = `${modeIcon} ${totalMins} 分`;
        const labelIcon = L.divIcon({
          className: '',
          html: `<div class="map-transit-time-label${isWalk ? ' walk' : ''}">${labelText}</div>`,
          iconSize: null,
          iconAnchor: [0, 0],
        });
        const labelMarker = L.marker([midLat, midLng], {
          icon: labelIcon,
          interactive: false,
          zIndexOffset: -100,
        }).addTo(leafletMap);
        mapTransitLabels.push(labelMarker);
      }
    }

    // fitBounds 用所有有值座標
    const orderedCoords = validIdxs.map(j => coords[j]);
    if (orderedCoords.length >= 2) {
      const bounds = L.latLngBounds(orderedCoords);
      leafletMap.fitBounds(bounds, { padding: [40, 40] });
    }
  }
}

// MAP STOP LIST (Inline Edit)
// ═══════════════════════════════════════════
function renderMapStopList() {
  const day    = data.days[currentMapDay];
  const stops  = day.stops;
  const drives = day.drives;
  const listEl = document.getElementById('map-stop-list');
  const navEl  = document.getElementById('map-nav-btn-wrap');

  listEl.innerHTML = `
    <div class="map-stop-list-header">
      <span class="map-stop-list-title">📍 ${day.label} · ${day.theme}</span>
      <button class="map-add-stop-btn" onclick="mapAddStop()">＋ 新增景點</button>
    </div>
  `;

  stops.forEach((stop, si) => {
    const isLast = si === stops.length - 1;

    // 計算抵達時間
    let arriveStr = '';
    if (si > 0) {
      const prev = stops[si - 1];
      const drv  = drives[si - 1] || 0;
      arriveStr = minutesToTime(timeToMinutes(prev.depart) + drv);
    }

    // 是否正在 geocoding
    const cleanName = stop.name.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFE0F\u{1F900}-\u{1F9FF}]/gu, '').trim();
    const geoKey = /澎湖|馬公|西嶼|湖西|白沙|望安|七美/.test(cleanName) ? cleanName : cleanName + ' 澎湖 台灣';
    const geoStatus = (geoKey in geocodeCache)
      ? (geocodeCache[geoKey] ? 'ok' : 'fail')
      : 'loading';

    const badgeHTML = stop.coords
      ? `<span class="map-geocode-badge manual" data-map-badge="${si}" title="已設定手動座標">📍 已設定座標</span>`
      : geoStatus === 'loading'
      ? `<span class="map-geocode-badge loading" data-map-badge="${si}">定位中…</span>`
      : geoStatus === 'fail'
      ? `<span class="map-geocode-badge fail" data-map-badge="${si}" title="Nominatim 找不到此地名，地圖上不會顯示">找不到位置</span>`
      : '';

    // 景點行
    const row = document.createElement('div');
    row.className = 'map-stop-row';
    row.dataset.si = si;
    row.innerHTML = `
      <div class="map-stop-letter${geoStatus === 'fail' ? ' geocode-fail' : ''}" data-map-letter="${si}">${stopLetter(si)}</div>
      <div class="map-stop-name-wrap">
        <input class="map-inline-name" value="${escHtml(stop.name)}" data-si="${si}" data-field="name"
          title="點擊編輯景點名稱"
          onblur="mapInlineSaveName(${si}, this.value)"
          onkeydown="if(event.key==='Enter'){this.blur();}">
        ${stop.note ? `<div class="map-stop-note">${escHtml(stop.note)}</div>` : ''}
        <div class="map-coords-row">
          <input class="map-inline-coords"
            value="${stop.coords ? stop.coords.lat + ', ' + stop.coords.lng : ''}"
            placeholder="貼上座標，如：23.5712, 119.5634"
            title="從 Google Maps 右鍵複製座標貼上"
            onblur="mapInlineSaveCoords(${si}, this.value)"
            onkeydown="if(event.key==='Enter'){this.blur();}">
          ${badgeHTML}
        </div>
      </div>
      <div class="map-stop-times">
        ${arriveStr ? `<div class="map-stop-arrive">抵達 ${arriveStr}</div>` : ''}
        <input class="map-inline-time" value="${stop.depart}" data-si="${si}"
          title="點擊編輯離開時間"
          onblur="mapInlineSaveDepart(${si}, this.value)"
          onkeydown="if(event.key==='Enter'){this.blur();}">
      </div>
      <div class="map-stop-actions">
        <a class="map-action-btn map-action-google" href="https://www.google.com/maps/search/${encodeURIComponent(_stopToPlace(stop.name))}" target="_blank" title="在 Google Maps 搜尋此景點（可複製座標）">🔍</a>
        <button class="map-action-btn" onclick="mapMoveStop(${si},-1)" title="上移" ${si===0?'disabled':''}>▲</button>
        <button class="map-action-btn" onclick="mapMoveStop(${si},1)" title="下移" ${isLast?'disabled':''}>▼</button>
        <button class="map-action-btn del" onclick="mapDeleteStop(${si})" title="刪除">✕</button>
      </div>
    `;
    listEl.appendChild(row);

    // 車程行
    if (!isLast) {
      const tr = document.createElement('div');
      tr.className = 'map-transit-row';
      const mode = (day.modes && day.modes[si]) || 'drive';
      const isWalk = mode === 'walk';
      const modeIcon = isWalk ? '🚶' : '🚗';
      const modeLabel = isWalk ? '步行' : '車程';
      const segURL = _buildSegGMapsURL(currentMapDay, si);
      tr.innerHTML = `
        <span class="map-transit-label">${modeIcon}</span>
        <input class="map-inline-drive" value="約 ${drives[si]} 分鐘" data-si="${si}"
          title="從 Google Maps 查好時間後，點此輸入分鐘數"
          onfocus="this.value='${drives[si]}'; this.select();"
          onblur="mapInlineSaveDrive(${si}, this.value)"
          onkeydown="if(event.key==='Enter'){this.blur();}">
        <button class="transit-mode-toggle" onclick="quickToggleMapSegMode(${si})" title="切換此段交通方式">
          ${isWalk ? '🚗開車' : '🚶步行'}
        </button>
        <a class="map-gmaps-btn" href="${segURL}" target="_blank" title="在 Google Maps 查詢此段${modeLabel}時間，複製後貼回左側輸入框">
          查 Google Maps ↗
        </a>
        <span class="map-transit-label">→ 抵達 ${minutesToTime(timeToMinutes(stop.depart) + (drives[si]||0))}</span>
      `;
      listEl.appendChild(tr);
    }
  });

  // 導航按鈕
  navEl.innerHTML = `
    <div class="map-nav-bottom">
      <a class="map-nav-hero-btn" href="${_buildNavURL(currentMapDay)}" target="_blank">
        🗺 在 Google Maps 開啟導航 ↗
      </a>
    </div>
  `;
}

// HTML escape
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Map inline save handlers ──

function mapInlineSaveName(si, val) {
  const di = currentMapDay;
  val = val.trim();
  if (!val) return;
  const oldName = data.days[di].stops[si].name;
  if (val === oldName) return;
  // 新名稱清除 cache（需重新 geocode）
  const cleanOld = oldName.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFE0F\u{1F900}-\u{1F9FF}]/gu,'').trim();
  delete geocodeCache[cleanOld];
  delete geocodeCache[cleanOld + ' 澎湖 台灣'];
  data.days[di].stops[si].name = val;
  pushUndo();
  autosave();
  // 同步行程頁
  renderStops(di);
  renderNavCard(di);
  // 同步地圖清單與標記
  renderMapStopList();
  refreshMapMarkers();
  showToast('✅ 景點名稱已更新');
}

function mapInlineSaveDepart(si, val) {
  const di = currentMapDay;
  if (!/^\d{1,2}:\d{2}$/.test(val)) {
    // 恢復原值
    renderMapStopList();
    showToast('⚠️ 時間格式錯誤，請輸入 HH:MM');
    return;
  }
  const hh = val.padStart(5, '0');
  data.days[di].stops[si].depart = hh;
  data.days[di].stops[si]._departUserSet = true; // 使用者明確設定
  recalcTimes(di, si);
  autosave();
  renderStops(di);
  renderNavCard(di);
  renderMapStopList();
  showToast('⏱ 時間已更新，後續景點自動重新計算');
}

function mapInlineSaveDrive(si, val) {
  const di = currentMapDay;
  const mins = parseInt(val);
  if (isNaN(mins) || mins < 1) {
    renderMapStopList();
    return;
  }
  data.days[di].drives[si] = mins;
  recalcTimes(di, si);
  autosave();
  renderStops(di);
  renderNavCard(di);
  renderMapStopList();
  showToast('✅ 時間已更新');
}

// Toggle mode for a segment directly from map page transit row
function quickToggleMapSegMode(si) {
  const di = currentMapDay;
  const day = data.days[di];
  if (!day.modes) day.modes = new Array(day.drives.length).fill('drive');
  while (day.modes.length < day.drives.length) day.modes.push('drive');
  day.modes[si] = (day.modes[si] === 'walk') ? 'drive' : 'walk';
  pushUndo();
  autosave();
  renderStops(di);
  renderNavCard(di);
  renderMapStopList();
  const modeLabel = day.modes[si] === 'walk' ? '步行 🚶' : '開車 🚗';
  showToast(`已切換為${modeLabel}，請點「查 Google Maps」取得時間`);
}

function mapInlineSaveCoords(si, val) {
  const di = currentMapDay;
  const stop = data.days[di].stops[si];
  val = val.trim();
  if (!val) {
    // 清除座標
    delete stop.coords;
    const cleanName = stop.name.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFE0F\u{1F900}-\u{1F9FF}]/gu,'').trim();
    const geoKey = /澎湖|馬公|西嶼|湖西|白沙|望安|七美/.test(cleanName) ? cleanName : cleanName + ' 澎湖 台灣';
    delete geocodeCache[geoKey];
    renderMapStopList();
    refreshMapMarkers();
    showToast('🗑 已清除座標');
    return;
  }
  const m = val.match(/^(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)$/);
  if (!m) {
    showToast('⚠️ 格式錯誤，請輸入如：23.5712, 119.5634');
    renderMapStopList();
    return;
  }
  const lat = parseFloat(m[1]), lng = parseFloat(m[2]);
  stop.coords = { lat, lng };
  // 注入 geocodeCache
  const cleanName = stop.name.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFE0F\u{1F900}-\u{1F9FF}]/gu,'').trim();
  const geoKey = /澎湖|馬公|西嶼|湖西|白沙|望安|七美/.test(cleanName) ? cleanName : cleanName + ' 澎湖 台灣';
  geocodeCache[geoKey] = { lat, lng };
  autosave();
  renderMapStopList();
  refreshMapMarkers();
  showToast('📍 座標已設定，地圖已更新！');
}

function mapMoveStop(si, dir) {
  const di = currentMapDay;
  const day = data.days[di];
  const targetIdx = si + dir;
  if (targetIdx < 0 || targetIdx >= day.stops.length) return;
  pushUndo();
  [day.stops[si], day.stops[targetIdx]] = [day.stops[targetIdx], day.stops[si]];
  const driveIdx = dir === 1 ? si : si - 1;
  if (driveIdx >= 0 && driveIdx + 1 < day.drives.length) {
    [day.drives[driveIdx], day.drives[driveIdx + 1]] = [day.drives[driveIdx + 1], day.drives[driveIdx]];
  }
  recalcTimes(di);
  autosave();
  renderStops(di);
  renderNavCard(di);
  renderMapStopList();
  refreshMapMarkers();
  showToast('↕️ 景點已移動');
}

function mapDeleteStop(si) {
  const di = currentMapDay;
  const day = data.days[di];
  if (day.stops.length <= 2) { showToast('⚠️ 至少需要保留 2 個景點'); return; }
  pushUndo();
  day.stops.splice(si, 1);
  if (si < day.drives.length) day.drives.splice(si, 1);
  if (day.modes && si < day.modes.length) day.modes.splice(si, 1);
  recalcTimes(di);
  autosave();
  renderStops(di);
  renderNavCard(di);
  renderMapStopList();
  refreshMapMarkers();
  showToast('🗑 已刪除景點');
}

function mapAddStop() {
  const di = currentMapDay;
  const day = data.days[di];
  const lastStop = day.stops[day.stops.length - 1];
  pushUndo();
  day.stops.push({ name: '📍 新景點', depart: lastStop.depart, stay: 60, note: '' });
  day.drives.push(15);
  if (!day.modes) day.modes = new Array(day.drives.length - 1).fill('drive');
  day.modes.push('drive');
  recalcTimes(di);
  autosave();
  renderStops(di);
  renderNavCard(di);
  renderMapStopList();
  refreshMapMarkers();
  // 聚焦到新景點的 input
  setTimeout(() => {
    const inputs = document.querySelectorAll('.map-inline-name');
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 100);
}

// EDIT STOP (Modal)
// ═══════════════════════════════════════════
let editTarget = null;
function editStop(di, si) {
  editTarget = { di, si };
  const stop = data.days[di].stops[si];
  document.getElementById('edit-name').value = stop.name;
  document.getElementById('edit-note').value = stop.note || '';
  document.getElementById('edit-depart').value = stop.depart;
  document.getElementById('edit-stay').value = stop.stay || '';
  // 填入已儲存的座標
  const coords = stop.coords;
  document.getElementById('edit-coords').value = coords ? `${coords.lat}, ${coords.lng}` : '';
  document.getElementById('coords-hint').textContent = coords ? `✅ 已設定座標，地圖將直接定位` : '';
  document.getElementById('coords-hint').style.color = 'var(--green)';
  document.getElementById('stop-modal').classList.add('open');
  updateModalHint();
}

function getArrivalMins() {
  if (!editTarget) return null;
  const { di, si } = editTarget;
  const day = data.days[di];
  if (si === 0) return null;
  const prevStop = day.stops[si - 1];
  const drive = day.drives[si - 1] || 0;
  return timeToMinutes(prevStop.depart) + drive;
}

function onStayChange() {
  if (!editTarget) return;
  const stayVal = parseInt(document.getElementById('edit-stay').value);
  if (isNaN(stayVal) || stayVal < 0) return;
  const arrivalMins = getArrivalMins();
  if (arrivalMins === null) return;
  document.getElementById('edit-depart').value = minutesToTime(arrivalMins + stayVal);
  updateModalHint();
}

function onDepartChange() {
  if (!editTarget) return;
  const departVal = document.getElementById('edit-depart').value;
  if (!departVal) return;
  const arrivalMins = getArrivalMins();
  if (arrivalMins === null) return;
  const stayMins = Math.max(0, timeToMinutes(departVal) - arrivalMins);
  document.getElementById('edit-stay').value = stayMins;
  updateModalHint();
}

function updateModalHint() {
  const hint = document.getElementById('modal-arrival-hint');
  if (!editTarget) { hint.textContent = ''; return; }
  const { di, si } = editTarget;
  const day = data.days[di];
  const arrivalMins = getArrivalMins();
  const departVal = document.getElementById('edit-depart').value;
  if (!departVal) { hint.textContent = ''; return; }
  const leaveMins = timeToMinutes(departVal);
  const drive = day.drives[si] || 0;
  const isLast = si === day.stops.length - 1;
  const stayVal = parseInt(document.getElementById('edit-stay').value) || 0;
  let hint1 = arrivalMins !== null ? `抵達 ${minutesToTime(arrivalMins)}` : '';
  let hint2 = stayVal ? `停留 ${stayVal} 分鐘後 ${minutesToTime(leaveMins)} 離開` : `${minutesToTime(leaveMins)} 離開`;
  let hint3 = (!isLast && drive) ? `→ 下一站約 ${minutesToTime(leaveMins + drive)} 抵達` : '';
  hint.textContent = [hint1, hint2, hint3].filter(Boolean).join('　');
}

function saveStop() {
  const { di, si } = editTarget;
  const stop = data.days[di].stops[si];
  const newName = document.getElementById('edit-name').value || stop.name;
  // 名稱變更時清除 geocode cache
  if (newName !== stop.name) {
    const cleanOld = stop.name.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFE0F\u{1F900}-\u{1F9FF}]/gu,'').trim();
    delete geocodeCache[cleanOld];
    delete geocodeCache[cleanOld + ' 澎湖 台灣'];
  }
  stop.name = newName;
  stop.note = document.getElementById('edit-note').value;
  stop.depart = document.getElementById('edit-depart').value || stop.depart;
  stop._departUserSet = true; // 使用者明確設定，recalcTimes 不覆寫
  stop.stay = parseInt(document.getElementById('edit-stay').value) || 0;

  // 解析手動座標
  const rawCoords = document.getElementById('edit-coords').value.trim();
  if (rawCoords) {
    const m = rawCoords.match(/^(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)$/);
    if (m) {
      const lat = parseFloat(m[1]), lng = parseFloat(m[2]);
      stop.coords = { lat, lng };
      // 注入 geocodeCache，地圖直接用這個，不再 geocode
      const cleanName = newName.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF\uFE00-\uFE0F\u{1F900}-\u{1F9FF}]/gu,'').trim();
      const geoKey = /澎湖|馬公|西嶼|湖西|白沙|望安|七美/.test(cleanName) ? cleanName : cleanName + ' 澎湖 台灣';
      geocodeCache[geoKey] = { lat, lng };
    } else {
      showToast('⚠️ 座標格式錯誤，請輸入如：23.5712, 119.5634');
      return;
    }
  } else {
    // 清除舊座標（若之前有設定）
    delete stop.coords;
  }
  recalcTimes(di, si);
  closeModal();
  pushUndo();
  autosave();
  renderStops(di);
  renderNavCard(di);
  syncMapIfActive(di);
  showToast('✅ 已儲存，時間已重新計算');
}

function closeModal() {
  document.getElementById('stop-modal').classList.remove('open');
  editTarget = null;
}

function exportJSON() {
  document.getElementById('export-menu').classList.remove('open');
  const exportObj = JSON.parse(JSON.stringify(data));
  const jsonStr = JSON.stringify(exportObj, null, 2);
  const safeName = data.title.replace(/[\u{1F300}-\u{1FFFF}\s]/gu, '').replace(/[^\w\u4e00-\u9fff]/g, '') || '旅遊行程';
  const filename = `${safeName}行程.json`;

  // 偵測是否在 LINE / WebView 環境（不支援 download 屬性）
  const ua = navigator.userAgent || '';
  const isLineOrWebView = /Line|KAKAOTALK|FBIOS|Instagram|WebView|wv\b/.test(ua)
    || (ua.includes('iPhone') && !ua.includes('Safari'))
    || (typeof window.webkit !== 'undefined' && !navigator.userAgent.includes('Safari/'));

  if (isLineOrWebView) {
    // LINE 瀏覽器不支援下載，改為顯示 JSON 讓使用者複製/分享
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
    modal.innerHTML = `
      <div style="background:white;border-radius:20px;padding:20px;max-width:480px;width:100%;max-height:80vh;display:flex;flex-direction:column;gap:12px;">
        <div style="font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:700;color:#1a6b8a;">📋 匯出 JSON</div>
        <p style="font-size:0.8rem;color:#4a6274;">LINE 瀏覽器不支援直接下載。請長按下方文字全選後複製，再貼到記事本儲存為 .json 檔案。</p>
        <textarea readonly style="flex:1;min-height:200px;border:1.5px solid #cce0ea;border-radius:10px;padding:8px;font-size:0.7rem;font-family:monospace;resize:none;">${jsonStr}</textarea>
        <div style="display:flex;gap:8px;">
          <button onclick="(function(btn){var ta=btn.closest('div[style]').querySelector('textarea');if(navigator.clipboard){navigator.clipboard.writeText(ta.value).then(function(){btn.textContent='✅ 複製成功！';btn.style.background='#2d9e6b';setTimeout(function(){btn.textContent='📋 複製 JSON';btn.style.background='#1a6b8a';},2500);}).catch(function(){ta.select();var ok=document.execCommand('copy');btn.textContent=ok?'✅ 複製成功！':'❌ 複製失敗，請手動全選';btn.style.background=ok?'#2d9e6b':'#9b3020';setTimeout(function(){btn.textContent='📋 複製 JSON';btn.style.background='#1a6b8a';},2500);});}else{ta.select();var ok=document.execCommand('copy');btn.textContent=ok?'✅ 複製成功！':'❌ 複製失敗，請手動全選';btn.style.background=ok?'#2d9e6b':'#9b3020';setTimeout(function(){btn.textContent='📋 複製 JSON';btn.style.background='#1a6b8a';},2500);}})(this)" style="flex:1;padding:9px;border-radius:12px;background:#1a6b8a;color:white;border:none;font-size:0.85rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:600;">📋 複製 JSON</button>

}

// ═══════════════════════════════════════════
// JSON VALIDATION
// ═══════════════════════════════════════════
// 自動修復 drives/modes 陣列長度，回傳錯誤訊息（null = 正常）
function sanitizeData(d) {
  if (!d || typeof d.title !== 'string' || !Array.isArray(d.days)) {
    return '缺少必要欄位（title 或 days）';
  }
  for (let di = 0; di < d.days.length; di++) {
    const day = d.days[di];
    const label = day.label || `Day ${di + 1}`;
    if (!Array.isArray(day.stops) || day.stops.length < 2) {
      return `${label}：景點數量不足（至少需要 2 個）`;
    }
    if (!Array.isArray(day.drives)) {
      return `${label}：缺少 drives 欄位`;
    }
    if (!day.stops.every(s => typeof s.depart === 'string')) {
      return `${label}：有景點缺少出發時間（depart）`;
    }
    const expected = day.stops.length - 1;
    // 自動修正 drives 長度（多的截掉、少的補15）
    if (day.drives.length !== expected) {
      console.warn(`自動修正 ${label} drives: ${day.drives.length} → ${expected}`);
      while (day.drives.length < expected) day.drives.push(15);
      day.drives = day.drives.slice(0, expected);
    }
    // 自動修正 modes 長度
    if (!day.modes) day.modes = new Array(expected).fill('drive');
    while (day.modes.length < expected) day.modes.push('drive');
    day.modes = day.modes.slice(0, expected);
  }
  return null; // 無錯誤
}

function importJSON() {
  document.getElementById('export-menu').classList.remove('open');
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const parsed = JSON.parse(ev.target.result);
        const errMsg = sanitizeData(parsed);
        if (errMsg) {
          showToast(`⚠️ 匯入失敗：${errMsg}`);
          return;
        }
        data = parsed;
        storageSet(STORAGE_KEY, JSON.stringify(data));
        Object.keys(geocodeCache).forEach(k => delete geocodeCache[k]);
        renderAll();
        showToast(`✅ 已匯入「${data.title}」，共 ${data.days.length} 天行程！`);
      } catch(err) {
        showToast('⚠️ 讀取 JSON 失敗，請確認檔案內容正確');
        console.error('JSON 匯入失敗', err);
      }
    };
    reader.readAsText(file, 'utf-8');
  };
  input.click();
}

function importHTML() {
  document.getElementById('export-menu').classList.remove('open');
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.html,text/html';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const html = ev.target.result;
        // 從 HTML 中擷取 DEFAULT_DATA（用字串切割，避免 regex 跨行問題）
        const startMarker = 'const DEFAULT_DATA = ';
        const si = html.indexOf(startMarker);
        if (si < 0) {
          showToast('⚠️ 無法從此 HTML 檔案讀取行程資料');
          return;
        }
        // Find matching closing }; by scanning braces
        let depth = 0, ei = -1;
        for (let ci = si + startMarker.length; ci < html.length; ci++) {
          if (html[ci] === '{') depth++;
          else if (html[ci] === '}') { depth--; if (depth === 0) { ei = ci + 1; break; } }
        }
        if (ei < 0) {
          showToast('⚠️ 無法從此 HTML 檔案讀取行程資料');
          return;
        }
        const parsed = JSON.parse(html.slice(si + startMarker.length, ei));
        const errMsg = sanitizeData(parsed);
        if (errMsg) {
          showToast(`⚠️ 行程資料有誤：${errMsg}`);
          return;
        }
        pushUndo();
        data = parsed;
        storageSet(STORAGE_KEY, JSON.stringify(data));
        Object.keys(geocodeCache).forEach(k => delete geocodeCache[k]);
        renderAll();
        showToast(`✅ 已從 HTML 匯入「${data.title}」，共 ${data.days.length} 天！`);
      } catch(err) {
        showToast('⚠️ 讀取 HTML 失敗，請確認是由本程式匯出的 index.html');
        console.error('HTML 匯入失敗', err);
      }
    };
    reader.readAsText(file, 'utf-8');
  };
  input.click();
}

function openImgExport() {
  document.getElementById('export-menu').classList.remove('open');
  const list = document.getElementById('img-day-list');
  list.innerHTML = '';
  data.days.forEach((day, di) => {
    const btn = document.createElement('button');
    btn.className = 'img-day-item';
    btn.innerHTML = `
      <div class="img-day-item-inner">
        <div class="iday-label">🗓 ${day.label}</div>
        <div class="iday-stops">${day.theme} · ${day.stops.length} 個景點</div>
      </div>
      <span style="font-size:1.2rem">⬇️</span>
    `;
    btn.onclick = () => exportDayImg(di);
    list.appendChild(btn);
  });
  document.getElementById('img-export-modal').classList.add('open');
}
function closeImgExport() {
  document.getElementById('img-export-modal').classList.remove('open');
}

function buildCaptureHTML(di) {
  const day = data.days[di];
  let stopsHTML = '';
  day.stops.forEach((stop, si) => {
    const isLast = si === day.stops.length - 1;
    const noteTag = stop.note ? `<span class="tag tag-note">${escHtml(stop.note)}</span>` : '';
    let arriveTag = '';
    if (si > 0) {
      const prevStop = day.stops[si - 1];
      const drive = day.drives[si - 1] || 0;
      const arrMins = timeToMinutes(prevStop.depart) + drive;
      arriveTag = `<span class="tag tag-arrive">抵達 ${minutesToTime(arrMins)}</span>`;
    }
    const leaveTag = !isLast
      ? `<span class="tag tag-leave">離開 ${stop.depart}</span>`
      : `<span class="tag tag-arrive">抵達 ${stop.depart}</span>`;
    stopsHTML += `
      <div class="capture-stop-row ${isLast ? 'cap-last' : ''}">
        <div class="cap-left">
          <div class="cap-num">${si + 1}</div>
          <div class="cap-line"></div>
        </div>
        <div class="cap-content">
          <div class="cap-name">${escHtml(stop.name)}</div>
          <div class="cap-tags">${arriveTag}${leaveTag}${noteTag}</div>
        </div>
      </div>
    `;
    if (!isLast) {
      const transitMode1 = (day.modes && day.modes[si]) || 'drive';
      const transitIcon1 = transitMode1 === 'walk' ? '🚶' : '🚗';
      stopsHTML += `<div class="cap-transit"><span class="cap-transit-text">${transitIcon1} 約 ${day.drives[si]} 分鐘</span></div>`;
    }
  });

  const card = document.createElement('div');
  card.className = 'capture-card';
  // Inject CSS variables as resolved values so html2canvas can read them
  card.style.cssText = 'position:fixed;left:-9999px;top:0;width:680px;' +
    '--ocean:#1a6b8a;--sky:#5aa8c8;--sky-light:#a8d4e8;--sand:#f5ede0;--coral:#e07a5f;' +
    '--dark:#1c2b35;--mid:#4a6274;--light:#eaf4f8;--white:#ffffff;--border:#cce0ea;' +
    '--green:#2d9e6b;--green-bg:#d8f0e4;--amber:#8a6200;--amber-bg:#fef3cd;' +
    '--amber-light:#b07c20;--amber-light-bg:#fff8e6;--red:#9b3020;--red-bg:#fce4e0;';
  card.innerHTML = `
    <div class="capture-header">
      <span class="ch-emoji">🏝</span>
      <div class="ch-title">${data.title.replace(/^[\p{Emoji}\s]+/u,'')}</div>
      <div class="ch-sub">${data.subtitle}</div>
      <div class="ch-day">🗓 ${day.label} · ${day.theme}</div>
    </div>
    <div class="capture-body">${stopsHTML}</div>
    <div class="capture-footer">由互動行程產生 · ${data.title}</div>
  `;
  return card;
}

async function exportDayImg(di) {
  closeImgExport();
  showProgress(`正在產生 Day ${di + 1} 圖片…`, 30);
  await new Promise(r => setTimeout(r, 100));
  const card = buildCaptureHTML(di);
  document.body.appendChild(card);
  try {
    showProgress('正在渲染…', 60);
    // Wait for fonts and rendering to settle
    if (document.fonts && document.fonts.ready) { await document.fonts.ready; }
    await new Promise(r => setTimeout(r, 400));
    const canvas = await html2canvas(card, { scale: 2, useCORS: true, backgroundColor: '#ffffff', width: 680, logging: false, allowTaint: false, foreignObjectRendering: false });
    showProgress('正在下載…', 90);
    const a = document.createElement('a');
    const safeName = data.title.replace(/[\u{1F300}-\u{1FFFF}\s]/gu,'').replace(/[^\w\u4e00-\u9fff]/g,'') || '行程';
    a.download = `${safeName}_Day${di + 1}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
    hideProgress();
    showToast(`🖼️ Day ${di + 1} 圖片已下載！`);
  } catch(e) {
    hideProgress();
    showToast('⚠️ 圖片產生失敗，請重試');
  } finally {
    document.body.removeChild(card);
  }
}

async function exportAllDaysImg() {
  closeImgExport();
  const total = data.days.length;
  for (let di = 0; di < total; di++) {
    showProgress(`正在產生 Day ${di + 1} / ${total} 圖片…`, Math.round((di / total) * 100));
    await new Promise(r => setTimeout(r, 150));
    const card = buildCaptureHTML(di);
    document.body.appendChild(card);
    try {
      if (document.fonts && document.fonts.ready) { await document.fonts.ready; }
      await new Promise(r => setTimeout(r, 400));
      const canvas = await html2canvas(card, { scale: 2, useCORS: true, backgroundColor: '#ffffff', width: 680, logging: false, allowTaint: false, foreignObjectRendering: false });
      const a = document.createElement('a');
      const safeName = data.title.replace(/[\u{1F300}-\u{1FFFF}\s]/gu,'').replace(/[^\w\u4e00-\u9fff]/g,'') || '行程';
      a.download = `${safeName}_Day${di + 1}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
      await new Promise(r => setTimeout(r, 600));
    } catch(e) {
      console.error(e);
    } finally {
      document.body.removeChild(card);
    }
  }
  hideProgress();
  showToast(`✅ 全部 ${total} 天圖片已下載！`);
}
